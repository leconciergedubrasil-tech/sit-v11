<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><title>SIT · CONFIG</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sit-shell.css">
<style>
.cfg-section{background:var(--bg1);border:1px solid var(--b1);padding:14px;margin-bottom:10px}
.cfg-title{font-size:8px;font-weight:700;color:var(--a1);font-family:var(--fu);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cfg-row{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.cfg-label{font-size:7.5px;font-weight:700;color:var(--t4);font-family:var(--fu);letter-spacing:.8px;text-transform:uppercase}
.cfg-input{background:var(--bg0);border:1px solid var(--b2);color:var(--g1);font-family:var(--fm);font-size:10px;padding:5px 8px;outline:none;transition:border-color .15s}
.cfg-input:focus{border-color:var(--g2)}
.cfg-input::placeholder{color:var(--t5)}
.cfg-btn{padding:5px 14px;font-size:8px;font-family:var(--fu);font-weight:700;letter-spacing:.5px;border:1px solid var(--g3);background:rgba(0,255,65,.08);color:var(--g1);cursor:pointer;transition:all .1s;margin-top:4px}
.cfg-btn:hover{background:rgba(0,255,65,.16);border-color:var(--g1)}
.cfg-btn.danger{border-color:var(--r2);background:rgba(255,51,51,.08);color:var(--r1)}
.cfg-hint{font-size:7.5px;color:var(--t5);font-family:var(--fu)}
.cfg-status{font-size:8px;font-family:var(--fu);font-weight:700;padding:2px 6px;border:1px solid}
.ok{color:var(--g2);border-color:var(--g3)}.fail{color:var(--r1);border-color:var(--r2)}.warn{color:var(--a1);border-color:var(--a3)}
</style>
</head>
<body class="sit-layout">
<div id="header"></div>
<div class="sit-body">
  <div class="nav-lateral">
    <div class="nav-section">
      <div class="nav-sec-hd">Config</div>
      <div class="nav-item active"><span class="a">⚙</span><span>CONFIGURAÇÕES</span></div>
      <div class="nav-item" onclick="SIT.go('MON')"><span class="t3">◉</span><span>MONITOR</span></div>
      <div class="nav-item" onclick="SIT.go('HELP')"><span class="t3">?</span><span>HELP</span></div>
    </div>
  </div>

  <div class="sit-content">
    <div style="background:var(--bg0);padding:6px 12px;border-bottom:1px solid var(--b3);display:flex;align-items:center;gap:8px;flex-shrink:0">
      <span style="font-size:18px;font-weight:700;color:var(--a1);font-family:var(--fu)">⚙ CONFIG</span>
      <span style="font-size:9px;color:var(--t3);font-family:var(--fu)">CONFIGURAÇÕES DO TERMINAL</span>
      <button onclick="window.history.back()" style="margin-left:auto;padding:2px 8px;font-size:7.5px;border:1px solid var(--b2);background:transparent;color:var(--g2);cursor:pointer;font-family:var(--fu)">← BACK</button>
    </div>

    <div style="flex:1;overflow-y:auto;padding:10px 12px">

      <!-- Supabase -->
      <div class="cfg-section">
        <div class="cfg-title">🗄 SUPABASE <span id="sb-status" class="cfg-status warn">NÃO TESTADO</span></div>
        <div class="cfg-row">
          <label class="cfg-label">Project URL</label>
          <input class="cfg-input" id="cfg-sb-url" placeholder="https://xxx.supabase.co">
        </div>
        <div class="cfg-row">
          <label class="cfg-label">Anon Key</label>
          <input class="cfg-input" id="cfg-sb-key" type="password" placeholder="eyJ...">
        </div>
        <div style="display:flex;gap:6px">
          <button class="cfg-btn" onclick="testSupabase()">TESTAR CONEXÃO</button>
          <button class="cfg-btn" onclick="saveSupabase()">SALVAR</button>
        </div>
        <div class="cfg-hint" style="margin-top:6px">Supabase → Settings → API → Project URL + anon public key</div>
      </div>

      <!-- Vault -->
      <div class="cfg-section">
        <div class="cfg-title">◆ VAULT WORKER <span id="vault-status" class="cfg-status warn">NÃO TESTADO</span></div>
        <div class="cfg-row">
          <label class="cfg-label">Worker URL</label>
          <input class="cfg-input" id="cfg-vault-url" placeholder="https://vault-worker.xxx.workers.dev">
        </div>
        <div class="cfg-row">
          <label class="cfg-label">Token de acesso</label>
          <input class="cfg-input" id="cfg-vault-token" type="password" placeholder="seu-vault-secret">
        </div>
        <div style="display:flex;gap:6px">
          <button class="cfg-btn" onclick="testVault()">TESTAR</button>
          <button class="cfg-btn" onclick="saveVault()">SALVAR</button>
        </div>
      </div>

      <!-- GNews -->
      <div class="cfg-section">
        <div class="cfg-title">📰 GNEWS API <span id="gnews-status" class="cfg-status warn">NÃO TESTADO</span></div>
        <div class="cfg-row">
          <label class="cfg-label">API Key</label>
          <input class="cfg-input" id="cfg-gnews" placeholder="sua-gnews-api-key">
        </div>
        <div style="display:flex;gap:6px">
          <button class="cfg-btn" onclick="testGNews()">TESTAR</button>
          <button class="cfg-btn" onclick="saveGNews()">SALVAR</button>
        </div>
        <div class="cfg-hint" style="margin-top:6px">Grátis 100 req/dia: gnews.io/register</div>
      </div>

      <!-- Sessão -->
      <div class="cfg-section">
        <div class="cfg-title">👤 SESSÃO ATUAL</div>
        <div id="session-info" style="font-size:9px;color:var(--t2);line-height:1.8"></div>
        <div style="display:flex;gap:6px;margin-top:8px">
          <button class="cfg-btn" onclick="testAll()">✓ TESTAR TUDO</button>
          <button class="cfg-btn danger" onclick="clearAll()">✕ LIMPAR TUDO</button>
        </div>
      </div>

    </div>
  </div>
</div>
<div id="statusbar"></div>
<script src="sit-db.js"></script>
<script src="sit-indicators.js"></script>
<script src="sit-auth.js"></script>
<script src="sit-core.js"></script>
<script src="sit-news.js"></script>
<script src="sit-vault-bridge.js"></script>
<script src="sit-supabase.js"></script>
<script>
const session = SIT.boot('CONFIG');
if (session) {
  AUTH.boot();
  SIT.setBreadcrumb([{label:'MON',href:'MON'},{label:'⚙ CONFIG'}]);

  // Carregar valores salvos
  document.getElementById('cfg-sb-url').value   = localStorage.getItem('sit_sb_url')    || '';
  document.getElementById('cfg-sb-key').value   = localStorage.getItem('sit_sb_key')    || '';
  document.getElementById('cfg-vault-url').value = localStorage.getItem('sit_vault_url') || '';
  document.getElementById('cfg-vault-token').value = localStorage.getItem('sit_vault_token') || '';
  document.getElementById('cfg-gnews').value     = localStorage.getItem('sit_gnews_key') || '';

  // Info da sessão
  const s = SIT.getSession() || {};
  document.getElementById('session-info').innerHTML =
    `Usuário: <b style="color:var(--t1)">${s.user||'—'}</b><br>`+
    `Plano: <b style="color:${AUTH.cfg.color}">${AUTH.plan}</b><br>`+
    `Sessões permitidas: <b>${AUTH.cfg.max_sessions===Infinity?'∞':AUTH.cfg.max_sessions}</b><br>`+
    `Login: ${s.loginAt?new Date(s.loginAt).toLocaleString('pt-BR'):'—'}`;

  function setStatus(id, ok, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'cfg-status ' + (ok ? 'ok' : 'fail');
    el.textContent = ok ? '✓ ' + msg : '✗ ' + msg;
  }

  window.testSupabase = async function() {
    setStatus('sb-status', null, 'TESTANDO...');
    const url = document.getElementById('cfg-sb-url').value.trim();
    const key = document.getElementById('cfg-sb-key').value.trim();
    if (!url || !key) return setStatus('sb-status', false, 'PREENCHA OS CAMPOS');
    try {
      const r = await fetch(`${url}/rest/v1/sit_ligas?limit=1`, {
        headers: { 'apikey': key, 'Authorization': `Bearer ${key}` },
        signal: AbortSignal.timeout(6000)
      });
      if (r.ok) { const d=await r.json(); setStatus('sb-status', true, d.length+' ligas'); }
      else setStatus('sb-status', false, 'HTTP '+r.status);
    } catch(e) { setStatus('sb-status', false, e.message.slice(0,30)); }
  };

  window.saveSupabase = function() {
    localStorage.setItem('sit_sb_url', document.getElementById('cfg-sb-url').value.trim());
    localStorage.setItem('sit_sb_key', document.getElementById('cfg-sb-key').value.trim());
    setStatus('sb-status', true, 'SALVO');
  };

  window.testVault = async function() {
    setStatus('vault-status', null, 'TESTANDO...');
    const url   = document.getElementById('cfg-vault-url').value.trim();
    const token = document.getElementById('cfg-vault-token').value.trim();
    if (!url || !token) return setStatus('vault-status', false, 'PREENCHA OS CAMPOS');
    try {
      const r = await fetch(`${url}/health`, {
        headers: { 'Authorization': `Bearer ${token}` },
        signal: AbortSignal.timeout(6000)
      });
      if (r.ok) setStatus('vault-status', true, 'ONLINE');
      else setStatus('vault-status', false, 'HTTP '+r.status);
    } catch(e) { setStatus('vault-status', false, e.message.slice(0,30)); }
  };

  window.saveVault = function() {
    localStorage.setItem('sit_vault_url',   document.getElementById('cfg-vault-url').value.trim());
    localStorage.setItem('sit_vault_token', document.getElementById('cfg-vault-token').value.trim());
    setStatus('vault-status', true, 'SALVO');
  };

  window.testGNews = async function() {
    setStatus('gnews-status', null, 'TESTANDO...');
    const key = document.getElementById('cfg-gnews').value.trim();
    if (!key) return setStatus('gnews-status', false, 'INSIRA A KEY');
    try {
      const r = await fetch(`https://gnews.io/api/v4/search?q=futebol&max=1&apikey=${key}`);
      if (r.ok) { const d=await r.json(); setStatus('gnews-status', true, (d.totalArticles||0)+' artigos'); }
      else setStatus('gnews-status', false, 'HTTP '+r.status);
    } catch(e) { setStatus('gnews-status', false, e.message.slice(0,30)); }
  };

  window.saveGNews = function() {
    localStorage.setItem('sit_gnews_key', document.getElementById('cfg-gnews').value.trim());
    setStatus('gnews-status', true, 'SALVO');
  };

  window.testAll = async function() {
    await testSupabase();
    await testVault();
    await testGNews();
  };

  window.clearAll = function() {
    if (!confirm('Limpar TODAS as configurações? (credenciais, favoritos, alertas)')) return;
    ['sit_sb_url','sit_sb_key','sit_vault_url','sit_vault_token','sit_gnews_key',
     'sit_faves','sit_alerts','sit_panels_open'].forEach(k => localStorage.removeItem(k));
    location.reload();
  };
}
</script>
</body>
</html>
