<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00ff41">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/icon.svg">
<meta charset="UTF-8"><title>SIT · COPA 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sit-shell.css">
<style>
.nation-card{
  display:flex;align-items:center;gap:6px;padding:4px 6px;
  border-bottom:1px solid var(--b0);cursor:pointer;
  transition:background .1s;font-size:9px;
}
.nation-card:hover{background:rgba(0,255,65,.03)}
.nation-flag{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.nation-name{flex:1;font-family:var(--fu);font-size:9px;color:var(--t2)}
.nation-bar{width:50px;flex-shrink:0}
.nb-inner{height:2px;border-radius:1px}
.nation-vpi{width:32px;text-align:right;font-family:var(--fm);font-size:9px;flex-shrink:0}
.nation-odds{width:36px;text-align:right;font-family:var(--fu);font-size:8px;color:var(--a1);flex-shrink:0}
/* Modal de detalhe */
.detail-panel{
  position:absolute;right:0;top:0;bottom:0;width:340px;
  background:var(--bg1);border-left:1px solid var(--b2);
  display:flex;flex-direction:column;overflow:hidden;
  z-index:10;
}
.detail-close{
  position:absolute;top:8px;right:8px;
  background:transparent;border:1px solid var(--b2);color:var(--t3);
  font-family:var(--fu);font-size:8px;padding:1px 6px;cursor:pointer;
}
</style>
</head>
<body class="sit-layout">
<div id="header"></div>
<div class="sit-body">
  <div class="nav-lateral">
    <div class="nav-section">
      <div class="nav-sec-hd">Funções</div>
      <div class="nav-item" onclick="SIT.go('MON')"><span class="t3">◉</span><span>MONITOR</span></div>
      <div class="nav-item active"><span>🏆</span><span>COPA 2026</span></div>
      <div class="nav-item" onclick="SIT.go('H2H')"><span class="t3">⇄</span><span>H2H</span></div>
      <div class="nav-item" onclick="SIT.go('EQS')"><span class="t3">⊞</span><span>SCREENER</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-sec-hd">Grupos</div>
      <div id="nav-groups"></div>
    </div>
  </div>

  <div class="sit-content" style="position:relative">
    <div style="background:var(--bg0);padding:6px 12px;border-bottom:1px solid var(--b3);display:flex;align-items:center;gap:8px;flex-shrink:0">
      <span style="font-size:18px;font-weight:700;color:var(--a1);font-family:var(--fu)">🏆 COPA 2026</span>
      <span style="font-size:9px;color:var(--t3);font-family:var(--fu)">FIFA · USA / MEX / CAN · 11 Jun–19 Jul 2026</span>
      <span class="bg buy" style="margin-left:auto">48 SELEÇÕES</span>
      <button onclick="enviarCopaParaVault()" id="btn-copa-vault" style="padding:2px 8px;font-size:7.5px;border:1px solid var(--p2);background:transparent;color:var(--p1);cursor:pointer;font-family:var(--fu);font-weight:700">⬆ VAULT</button>
      <button onclick="window.history.back()" style="padding:2px 8px;font-size:7.5px;border:1px solid var(--b2);background:transparent;color:var(--g2);cursor:pointer;font-family:var(--fu)">← BACK</button>
    </div>

    <div class="tabs-row" id="tabs">
      <button class="tab-btn on" onclick="showTab('ranking',this)">VPI RANKING</button>
      <button class="tab-btn" onclick="showTab('grupos',this)">GRUPOS</button>
      <button class="tab-btn" onclick="showTab('odds',this)">ODDS</button>
      <button class="tab-btn" onclick="showTab('seleções',this)">SELEÇÕES</button>
      <button class="tab-btn" onclick="showTab('calendario',this)">CALENDÁRIO</button>
      <button class="tab-btn" onclick="showTab('news',this)">NEWS</button>
      <button class="tab-btn diamond" onclick="showTab('vault',this)">◆ VAULT</button>
    </div>

    <div style="flex:1;overflow-y:auto;padding:8px 12px;position:relative" id="tcontent"></div>
    <div id="detail-panel" style="display:none"></div>
  </div>
</div>
<div id="statusbar"></div>
<script src="sit-db.js"></script>
<script src="sit-indicators.js"></script>
<script src="sit-auth.js"></script>
<script src="sit-core.js"></script>
<script src="sit-panels.js"></script>
<script src="sit-news.js"></script>
<script src="sit-vault-bridge.js"></script>
<script src="sit-supabase.js"></script>
<script>
const session = SIT.boot('COPA');
if (session) {
  AUTH.boot();
  document.title = 'SIT · COPA 2026 — FIFA World Cup';
  SIT.setBreadcrumb([{label:'MON',href:'MON'},{label:'COPA 2026'}]);

  const nations = SIT_DB.COPA_NATIONS || [];
  const grupos  = [...new Set(nations.map(n=>n.grupo))].sort();

  // Nav grupos
  document.getElementById('nav-groups').innerHTML = grupos.map(g =>
    `<div class="nav-item" onclick="filterGrupo('${g}')">
      <span class="dim" style="font-size:8px">▸</span>
      <span>${g}</span>
    </div>`
  ).join('');

  window.filterGrupo = function(g) {
    showTab('grupos');
    document.querySelectorAll('#tabs .tab-btn').forEach(b => {
      b.classList.toggle('on', b.textContent.trim()==='GRUPOS');
    });
    setTimeout(() => {
      document.querySelectorAll('.grupo-block').forEach(el => {
        el.style.display = el.dataset.grupo === g ? 'block' : 'none';
      });
    }, 50);
  };

  window.showTab = function(tab, btn) {
    document.querySelectorAll('#tabs .tab-btn').forEach(b => b.classList.remove('on'));
    if (btn) btn.classList.add('on');
    else document.querySelector(`[onclick*="${tab}"]`)?.classList.add('on');
    document.getElementById('tcontent').innerHTML = renderTab(tab);
    document.getElementById('detail-panel').style.display = 'none';
  };

  window.openNation = function(code) {
    const n = nations.find(x => x.code === code);
    if (!n) return;
    const dp = document.getElementById('detail-panel');
    dp.style.display = 'flex';
    const rc = n.rating==='AAA'?'buy':n.vpi>=80?'hold':'sell';
    dp.innerHTML = `
      <div class="detail-panel">
        <button class="detail-close" onclick="document.getElementById('detail-panel').style.display='none'">✕ FECHAR</button>
        <div style="padding:12px;border-bottom:1px solid var(--b1)">
          <div style="font-size:24px">${n.flag}</div>
          <div style="font-size:16px;font-weight:700;color:var(--t1);font-family:var(--fu);margin-top:4px">${n.name}</div>
          <div style="font-size:8px;color:var(--t4);font-family:var(--fu)">${n.grupo} · ${n.conf} · FIFA #${n.fifa}</div>
          <div style="display:flex;gap:6px;margin-top:6px;align-items:center">
            <span class="bg ${rc}">${n.rating}</span>
            <span class="${n.vpi>=80?'g':n.vpi>=70?'a':'r'}" style="font-size:14px;font-weight:700;font-family:var(--fu)">${n.vpi}%</span>
            <span class="dim" style="font-size:8px">VPI</span>
            <span class="a" style="margin-left:auto;font-size:9px;font-family:var(--fu)">Odds: ${n.odds}x</span>
          </div>
        </div>
        <div style="padding:8px 12px;border-bottom:1px solid var(--b1)">
          <div class="dim" style="font-size:7px;font-family:var(--fu);letter-spacing:1px;margin-bottom:4px">TÉCNICO</div>
          <div style="font-size:9px;color:var(--t1)">${n.coach}</div>
          <div style="font-size:8px;color:var(--t3);margin-top:3px">${n.style}</div>
        </div>
        <div style="padding:8px 12px;flex:1;overflow-y:auto">
          <div class="dim" style="font-size:7px;font-family:var(--fu);letter-spacing:1px;margin-bottom:4px">CONVOCADOS (${(n.athletes||[]).length})</div>
          <table class="dt"><thead><tr><th>ATLETA</th><th>POS</th><th>VPI</th><th>CLUBE</th></tr></thead><tbody>
          ${(n.athletes||[]).sort((a,b)=>b.vpi-a.vpi).map(a => `
            <tr>
              <td style="color:var(--t1)">${a.n}</td>
              <td class="dim">${a.pos}</td>
              <td class="${a.vpi>=80?'g':a.vpi>=70?'a':'r'}">${a.vpi}%</td>
              <td class="dim" style="font-size:8px">${a.clube}</td>
            </tr>`).join('')}
          </tbody></table>
        </div>
      </div>`;
  };

  function nationRow(n) {
    const col = n.vpi>=80?'var(--g1)':n.vpi>=70?'var(--a1)':'var(--r1)';
    return `<div class="nation-card" onclick="openNation('${n.code}')">
      <span class="nation-flag">${n.flag}</span>
      <span class="nation-name">${n.name}</span>
      <div class="nation-bar">
        <div class="nb-inner" style="width:${n.vpi}%;background:${col}"></div>
      </div>
      <span class="nation-vpi" style="color:${col}">${n.vpi}%</span>
      <span class="nation-odds">${n.odds}x</span>
    </div>`;
  }

  function renderTab(tab) {
    if (tab === 'ranking') {
      const sorted = [...nations].sort((a,b)=>b.vpi-a.vpi);
      return '<div class="sec">VPI RANKING — '+sorted.length+' SELEÇÕES · CLIQUE PARA DETALHE</div>' +
        '<table class="dt"><thead><tr><th>#</th><th>SELEÇÃO</th><th>CONF.</th><th>VPI</th><th>PBI</th><th>FIFA</th><th>ODDS</th><th>PROB%</th><th>RATING</th></tr></thead><tbody>' +
        sorted.map((n,i) => {
          const rc = n.vpi>=84?'buy':n.vpi>=74?'hold':'sell';
          return `<tr onclick="openNation('${n.code}')" style="cursor:pointer">
            <td class="dim">${i+1}</td>
            <td><span style="font-size:12px;margin-right:5px">${n.flag}</span><span style="font-family:var(--fu)">${n.name}</span></td>
            <td class="dim">${n.conf}</td>
            <td class="${n.vpi>=80?'g':n.vpi>=70?'a':'r'}" style="font-weight:700">${n.vpi}%</td>
            <td class="${n.pbi<20?'g':n.pbi<28?'a':'r'}">${n.pbi}%</td>
            <td class="dim">${n.fifa}</td>
            <td class="a">${n.odds}x</td>
            <td class="${n.prob>=15?'g':n.prob>=8?'a':'dim'}">${n.prob}%</td>
            <td><span class="bg ${rc}">${n.rating}</span></td>
          </tr>`;
        }).join('') + '</tbody></table>';
    }

    if (tab === 'grupos') {
      return grupos.map(g => {
        const gNations = nations.filter(n => n.grupo === g).sort((a,b)=>b.vpi-a.vpi);
        return `<div class="grupo-block" data-grupo="${g}" style="margin-bottom:10px">
          <div class="sec">${g.toUpperCase()}</div>
          ${gNations.map(n => nationRow(n)).join('')}
        </div>`;
      }).join('');
    }

    if (tab === 'odds') {
      const sorted = [...nations].sort((a,b)=>parseFloat(a.odds)-parseFloat(b.odds)).slice(0,16);
      return '<div class="sec">ODDS PARA CAMPEÃ — TOP 16</div>' +
        '<table class="dt"><thead><tr><th>#</th><th>SELEÇÃO</th><th>ODDS</th><th>VPI</th><th>PROB%</th><th>GRUPO</th></tr></thead><tbody>' +
        sorted.map((n,i) => `
          <tr onclick="openNation('${n.code}')" style="cursor:pointer">
            <td class="dim">${i+1}</td>
            <td><span style="font-size:12px;margin-right:5px">${n.flag}</span>${n.name}</td>
            <td class="${i<3?'g':i<8?'a':'dim'}" style="font-weight:700">${n.odds}x</td>
            <td class="${n.vpi>=80?'g':n.vpi>=70?'a':'r'}">${n.vpi}%</td>
            <td class="${n.prob>=15?'g':n.prob>=8?'a':'dim'}">${n.prob}%</td>
            <td class="dim">${n.grupo}</td>
          </tr>`
        ).join('') + '</tbody></table>';
    }

    if (tab === 'seleções') {
      return '<div class="sec">TODAS AS SELEÇÕES — '+nations.length+' · CLIQUE PARA CONVOCADOS</div>' +
        nations.map(n => nationRow(n)).join('');
    }

    if (tab === 'news') {
      const tc = document.getElementById('tcontent');
      NEWS.buscarTime('Copa do Mundo 2026 FIFA','UCL').then(s => {
        tc.innerHTML = '<div style="padding:8px 12px" class="fadein">'+NEWS.renderPainel(s,'NOTÍCIAS · COPA 2026')+'</div>';
      });
      return '<div class="dim" style="padding:12px">Buscando notícias...</div>';
    }
    if (tab === 'vault') {
      const cached = localStorage.getItem('sit_vault_resp_COPA2026');
      if (cached) { try { return VAULT_BRIDGE.renderResposta(JSON.parse(cached)); } catch(e){} }
      return '<div style="text-align:center;padding:32px">'
        +'<div style="font-size:24px;margin-bottom:12px">◆</div>'
        +'<div style="font-size:11px;color:var(--p1);font-family:var(--fu);margin-bottom:8px">VAULT — COPA 2026</div>'
        +'<button onclick="enviarCopaParaVault()" style="padding:8px 20px;font-size:9px;font-family:var(--fu);font-weight:700;border:1px solid var(--p1);background:rgba(192,132,252,.1);color:var(--p1);cursor:pointer">⬆ VAULT</button></div>';
    }
    if (tab === 'calendario') {
      const events = [
        {d:'11 Jun',fase:'Abertura',loc:'MetLife Stadium, NJ',nota:'EUA vs TBD'},
        {d:'12-26 Jun',fase:'Fase de Grupos',loc:'16 cidades · USA/MEX/CAN',nota:'48 jogos'},
        {d:'29 Jun–2 Jul',fase:'Oitavas de Final',loc:'Dallas, Miami, Seattle',nota:'16 jogos'},
        {d:'4–5 Jul',fase:'Quartas de Final',loc:'Los Angeles, San Francisco',nota:'8 jogos'},
        {d:'8–9 Jul',fase:'Semifinais',loc:'Atlanta + Dallas',nota:'4 jogos'},
        {d:'12 Jul',fase:'3º Lugar',loc:'Miami, FL',nota:'Jogo do Bronze'},
        {d:'19 Jul',fase:'⚽ FINAL',loc:'MetLife Stadium, NJ',nota:'Grande Final'},
      ];
      return '<div class="sec">CALENDÁRIO COPA 2026</div>' +
        '<table class="dt"><thead><tr><th>DATA</th><th>FASE</th><th>LOCAL</th><th>NOTA</th></tr></thead><tbody>' +
        events.map(e => `
          <tr>
            <td class="a" style="font-weight:700;white-space:nowrap">${e.d}</td>
            <td class="${e.fase.includes('FINAL')?'g':'t1'}">${e.fase}</td>
            <td class="dim" style="font-size:8px">${e.loc}</td>
            <td class="dim" style="font-size:8px">${e.nota}</td>
          </tr>`
        ).join('') + '</tbody></table>';
    }
    return '';
  }

  showTab('ranking');
}
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").then(()=>console.log("[PWA] SW registrado")).catch(e=>console.warn("[PWA]",e));}</script>
</body>
</html>
