<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00ff41">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/icon.svg">
<meta charset="UTF-8"><title>SIT · TICKER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sit-shell.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:var(--t1);font-family:var(--fm);
  overflow:hidden;height:36px;display:flex;flex-direction:column}
.ticker-wrap{flex:1;overflow:hidden;display:flex;align-items:center;position:relative;cursor:move}
.ticker-wrap::before,.ticker-wrap::after{
  content:'';position:absolute;top:0;bottom:0;width:24px;z-index:10;pointer-events:none}
.ticker-wrap::before{left:0;background:linear-gradient(90deg,#000,transparent)}
.ticker-wrap::after{right:0;background:linear-gradient(270deg,#000,transparent)}
.ticker-inner{display:flex;white-space:nowrap;animation:ticker 60s linear infinite}
.ticker-inner:hover{animation-play-state:paused}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:4px;padding:0 12px;cursor:pointer;font-size:9px;border-right:1px solid var(--b1);transition:background .1s}
.ti:hover{background:var(--b1)}
.tn{font-family:var(--fu);font-weight:700;color:var(--t3);font-size:8px;letter-spacing:.5px}
.tsep{color:var(--b2);padding:0 2px}
.sit-logo{padding:0 10px;font-size:10px;font-weight:700;color:var(--g1);font-family:var(--fu);letter-spacing:2px;flex-shrink:0;border-right:1px solid var(--b2)}
.clk{font-size:8px;color:var(--g3);font-family:var(--fm);padding:0 8px;flex-shrink:0;border-left:1px solid var(--b1)}
</style>
</head>
<body>
<div class="ticker-wrap">
  <span class="sit-logo">SIT</span>
  <div class="ticker-inner" id="ticker"></div>
  <span class="clk" id="clk"></span>
</div>
<script src="sit-db.js"></script>
<script>
const bc=new BroadcastChannel('sit_panels');

function render(){
  const db=SIT_DB.DB;
  const items=Object.entries(db).map(([k,t])=>{
    const col=t.chgN>0?'tup':'tdn';
    const arr=t.chgN>0?'▲':t.chgN<0?'▼':'●';
    return `<span class="ti" onclick="bc.postMessage({type:'NAV',cmd:'${k}'})">
      <span class="tn">${t.tk.split('.')[0]}</span>
      <span class="${col}">${arr} ${t.vpi}%</span>
      <span class="${col}" style="font-size:7px">${t.chg}</span>
    </span><span class="tsep">·</span>`;
  }).join('');
  const el=document.getElementById('ticker');
  el.innerHTML=items+items;
}

setInterval(()=>{document.getElementById('clk').textContent=new Date().toLocaleTimeString('pt-BR');},1000);
render();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").then(()=>console.log("[PWA] SW registrado")).catch(e=>console.warn("[PWA]",e));}</script>
</body>
</html>
