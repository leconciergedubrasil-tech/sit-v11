<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00ff41">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/icon.svg">
<meta charset="UTF-8">
<title>SIT · ATHLETE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sit-shell.css">
<style>
.ath-hd{background:var(--bg0);padding:8px 14px;border-bottom:1px solid var(--b3);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ath-name{font-size:18px;font-weight:700;color:var(--g1);font-family:var(--fu);letter-spacing:1px}
.ath-pos{font-size:10px;color:var(--a1);font-family:var(--fu)}
.ath-right{margin-left:auto;display:flex;gap:6px}
.radar-wrap{position:relative;width:200px;height:200px;margin:0 auto}
.radar-lbl{position:absolute;font-size:8px;color:var(--t3);font-family:var(--fu);text-align:center;white-space:nowrap}
</style>
</head>
<body class="sit-layout">
<div id="header"></div>
<div class="sit-body">
  <div class="nav-lateral">
    <div class="nav-section">
      <div class="nav-sec-hd">Funções</div>
      <div class="nav-item" onclick="SIT.go('MON')"><span>◉</span><span>MONITOR</span></div>
      <div class="nav-item" id="nav-back-team"><span>←</span><span>VOLTAR TIME</span></div>
      <div class="nav-item" onclick="SIT.go('COPA')"><span>🏆</span><span>COPA 2026</span></div>
      <div class="nav-item" onclick="SIT.go('MRKT')"><span>↔</span><span>MERCADO</span></div>
    </div>
    <div class="nav-section"><div class="nav-sec-hd">Elenco</div><div id="nav-squad"></div></div>
  </div>
  <div class="sit-content">
    <div class="ath-hd">
      <span class="ath-name" id="ath-name">—</span>
      <span class="ath-pos" id="ath-pos">—</span>
      <span class="bg" id="ath-rating">—</span>
      <span id="ath-vpi" style="font-size:11px">—</span>
      <div class="ath-right">
        <span class="dim" id="ath-meta" style="font-size:8px"></span>
        <button onclick="window.history.back()" style="padding:3px 8px;font-size:8px;border:1px solid var(--b2);background:transparent;color:var(--g2);cursor:pointer;font-family:var(--fu)">← BACK</button>
        <button id="btn-fav" onclick="addFav()" style="padding:3px 8px;font-size:8px;border:1px solid var(--b2);background:transparent;color:var(--a1);cursor:pointer;font-family:var(--fu)">★ FAVE</button>
        <button id="btn-vault-a" onclick="enviarAtletaParaVault()" style="padding:2px 8px;font-size:7.5px;border:1px solid var(--p2);background:transparent;color:var(--p1);cursor:pointer;font-family:var(--fu);font-weight:700">⬆ VAULT</button>
        <button onclick="goTeam()" style="padding:3px 8px;font-size:8px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--fu)" id="btn-team">← TIME</button>
      </div>
    </div>
    <div class="tabs-row" id="tabs"></div>
    <div style="flex:1;overflow-y:auto;padding:8px 12px" id="tab-content"></div>
  </div>
</div>
<div id="statusbar"></div>
<script src="sit-db.js"></script>
<script src="sit-indicators.js"></script>
<script src="sit-auth.js"></script>
<script src="sit-core.js"></script>
<script src="sit-panels.js"></script>
<script src="sit-news.js"></script>
<script src="sit-vault-bridge.js"></script>
<script src="sit-supabase.js"></script>
<script>
const params   = new URLSearchParams(window.location.search);
const teamKey  = (params.get('team')||'FLA').toUpperCase();
const athName  = decodeURIComponent(params.get('athlete')||'');
const initTab  = (params.get('tab')||'DES').toUpperCase();
const session  = SIT.boot('ATHLETE','<div class="sb-item">ATHLETE <b id="sb-ath">—</b></div>');

if (session) {
  AUTH.boot();
  const db  = SIT_DB.DB;
  const tm  = db[teamKey];
  const ath = tm ? (tm.athletes||[]).find(a=>a.n===athName) : null;

  document.getElementById('nav-back-team').onclick = () => SIT.go(teamKey);
  document.getElementById('btn-team').textContent  = '← ' + (tm?tm.tk:'TIME');

  if (!ath || !tm) {
    document.getElementById('tab-content').innerHTML =
      '<div class="card">Atleta não encontrado. <a href="mon.html" class="lk">← MON</a></div>';
  } else {
    document.title = 'SIT · '+ath.n+' / '+tm.tk;
    document.getElementById('sb-ath').textContent   = ath.n;
    document.getElementById('ath-name').textContent = ath.n;
    document.getElementById('ath-pos').textContent  = ath.pos+' · '+tm.tk;
    const rc = ath.vpi>=80?'buy':ath.vpi>=65?'hold':'sell';
    document.getElementById('ath-rating').className  = 'bg '+rc;
    document.getElementById('ath-rating').textContent= (ath.vpi>=80?'BUY':ath.vpi>=65?'HOLD':'SELL')+' '+ath.vpi+'%';
    document.getElementById('ath-vpi').className    = ath.vpi>=80?'g':ath.vpi>=65?'a':'r';
    document.getElementById('ath-vpi').textContent  = 'PBI:'+ath.pbi+'%';
    document.getElementById('ath-meta').textContent = ath.nat+' · '+ath.age+'a · '+tm.n;
    if (SIT.isFave('athletes',teamKey+'/'+athName))
      document.getElementById('btn-fav').textContent='★ SAVED';
    SIT.setBreadcrumb([{label:'MON',href:'MON'},{label:tm.tk,href:teamKey},{label:ath.n}]);

    // Nav squad
    document.getElementById('nav-squad').innerHTML = (tm.athletes||[]).sort((a,b)=>b.vpi-a.vpi).map(a=>{
      const act = a.n===athName?' active':'';
      const url = 'athlete.html?team='+teamKey+'&athlete='+encodeURIComponent(a.n);
      return '<div class="nav-item'+act+'" onclick="window.location.href=\''+url+'\'" style="gap:4px">'+
        '<span class="dim" style="font-size:8px;width:28px">'+a.pos+'</span>'+
        '<span style="flex:1;font-size:9px">'+a.n.split(' ').slice(-1)[0]+'</span>'+
        '<span class="'+(a.vpi>=80?'g':a.vpi>=65?'a':'r')+'" style="font-size:8px">'+a.vpi+'%</span></div>';
    }).join('');

    // Tabs
    const TABS = ['DES','TECH','VPI','HP','GRAHAM','BUFFETT','BLACKROCK','NASH','JUNG','FEYNMANN'];
    document.getElementById('tabs').innerHTML = TABS.map(tab=>{
      const dm = ['GRAHAM','BUFFETT','BLACKROCK','NASH','JUNG','FEYNMANN'].includes(tab)?' diamond':'';
      const on = tab===initTab?' on':'';
      return '<button class="tab-btn'+on+dm+'" onclick="loadTab(\''+tab+'\',this)">'+tab+'</button>';
    }).join('');
    loadTab(initTab, document.querySelector('#tabs .on'));
  }

  function addFav(){ SIT.addFave('athletes',teamKey+'/'+athName); document.getElementById('btn-fav').textContent='★ SAVED'; }
  function goTeam(){ window.location.href='team.html?team='+teamKey; }

  function loadTab(tab, btn) {
    history.replaceState(null,'','athlete.html?team='+teamKey+'&athlete='+encodeURIComponent(athName)+'&tab='+tab);
    document.querySelectorAll('#tabs .tab-btn').forEach(b=>b.classList.remove('on'));
    if (btn) btn.classList.add('on');
    document.getElementById('tab-content').innerHTML = renderTab(tab);
  }

  function renderTab(tab) {
    const tm  = SIT_DB.DB[teamKey];
    const a   = tm?(tm.athletes||[]).find(x=>x.n===athName):null;
    if (!a) return '';
    const radarAttrs = ['VEL','TEC','FIS','MEN','TAT','CRI'];
    const radarVals  = [a.vel||70, a.tec||70, a.fis||70, a.men||70, a.tat||70, a.vpi||70];

    if (tab==='DES') {
      return '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px">'+
        '<div class="card-dark"><div class="dim" style="font-size:7px">VPI</div><div class="big '+(a.vpi>=80?'g':a.vpi>=65?'a':'r')+'">'+a.vpi+'%</div></div>'+
        '<div class="card-dark"><div class="dim" style="font-size:7px">PBI</div><div class="big '+(a.pbi>25?'r':'a')+'">'+a.pbi+'%</div></div>'+
        '<div class="card-dark"><div class="dim" style="font-size:7px">GOLS</div><div class="big g">'+a.gols+'</div></div>'+
        '<div class="card-dark"><div class="dim" style="font-size:7px">ASSISTS</div><div class="big a">'+a.ass+'</div></div>'+
        '<div class="card-dark"><div class="dim" style="font-size:7px">MINUTOS</div><div class="big">'+a.min+'</div></div></div>'+
        '<div style="display:grid;grid-template-columns:1fr 220px;gap:10px">'+
        '<div>'+
        '<div class="sec">IDENTITY DATA</div>'+
        '<div class="kvg">'+
        '<div class="kl">NOME COMPLETO</div><div class="kv">'+a.n+'</div>'+
        '<div class="kl">POSIÇÃO</div><div class="kv">'+a.pos+'</div>'+
        '<div class="kl">CLUBE</div><div class="kv lk" onclick="window.location.href=\'team.html?team='+teamKey+'\'">'+tm.tk+' — '+tm.n+'</div>'+
        '<div class="kl">NACIONALIDADE</div><div class="kv">'+a.nat+'</div>'+
        '<div class="kl">IDADE</div><div class="kv">'+a.age+' anos</div>'+
        '<div class="kl">SALÁRIO</div><div class="kv g">'+a.sal+'</div>'+
        '<div class="kl">CLÁUSULA RESCISÓRIA</div><div class="kv r">'+a.clause+'</div>'+
        '<div class="kl">CONTRATO ATÉ</div><div class="kv a">'+a.ctr+'</div>'+
        '<div class="kl">VPI</div><div class="kv g">'+a.vpi+'%</div>'+
        '<div class="kl">PBI</div><div class="kv '+(a.pbi>25?'r':'a')+'">'+a.pbi+'%</div>'+
        '</div></div>'+
        '<div>'+
        '<div class="sec">RADAR SIT-QUANT</div>'+
        renderRadar(radarAttrs, radarVals)+
        '</div></div>'+
        '<div class="sec" style="margin-top:8px">PERFIL DE CARREIRA</div>'+
        '<div class="card" style="font-size:10px;color:var(--t2);line-height:1.7">'+(a.bio||'Perfil em desenvolvimento.')+'</div>';
    }
    if (tab==='TECH') {
      return '<div class="sec">ANÁLISE TÉCNICA — INDICADORES VPI/PBI</div>'+
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px">'+
        radarAttrs.map((attr,i)=>'<div class="card-dark">'+
          '<div class="dim" style="font-size:7px">'+attr+'</div>'+
          '<div style="display:flex;align-items:center;gap:6px;margin-top:4px">'+
          '<div style="flex:1;height:4px;background:var(--bg0);border-radius:2px">'+
          '<div style="width:'+radarVals[i]+'%;height:100%;background:'+(radarVals[i]>=80?'var(--g1)':radarVals[i]>=65?'var(--a1)':'var(--r1)')+';border-radius:2px"></div></div>'+
          '<span class="'+(radarVals[i]>=80?'g':radarVals[i]>=65?'a':'r')+'" style="font-size:9px;font-weight:700">'+radarVals[i]+'</span>'+
          '</div></div>'
        ).join('')+'</div>'+
        '<div class="sec">COMPARAÇÃO POSICIONAL (LIGA)</div>'+
        '<table class="dt"><thead><tr><th>MÉTRICA</th><th>'+a.n.split(' ').slice(-1)[0]+'</th><th>MÉD. LIGA</th><th>TOP 10%</th><th>DELTA</th></tr></thead><tbody>'+
        [
          {m:'VPI%', v:a.vpi, avg:71.2, top:85.0},
          {m:'PBI%', v:a.pbi, avg:22.1, top:15.0},
          {m:'GOLS', v:a.gols, avg:8.4, top:18.0},
          {m:'ASSIST', v:a.ass, avg:6.2, top:12.0},
          {m:'MIN/90', v:a.min, avg:2340, top:2800},
        ].map(row=>{
          const delta=(row.v-row.avg);
          return '<tr><td class="dim">'+row.m+'</td>'+
            '<td class="'+(row.v>=row.top?'g':row.v>=row.avg?'a':'r')+'">'+row.v+'</td>'+
            '<td class="dim">'+row.avg+'</td>'+
            '<td class="g">'+row.top+'</td>'+
            '<td class="'+(delta>=0?'g':'r')+'">'+(delta>=0?'+':'')+delta.toFixed(1)+'</td></tr>';
        }).join('')+'</tbody></table>';
    }
    if (tab==='HP') {
      return '<div class="sec">HISTÓRICO DE PARTIDAS — ÚLTIMAS ATUAÇÕES</div>'+
        '<table class="dt"><thead><tr><th>DATA</th><th>ADVERSÁRIO</th><th>PLACAR</th><th>GOLS</th><th>ASS</th><th>VPI</th><th>NOTA</th></tr></thead><tbody>'+
        (a.matches||[]).map(m=>'<tr>'+
          '<td class="dim">'+m.d+'</td><td>'+m.adv+'</td>'+
          '<td class="a" style="font-weight:700">'+m.pl+'</td>'+
          '<td class="g">'+m.g+'</td><td class="a">'+m.a+'</td>'+
          '<td class="'+(m.v>=80?'g':m.v>=65?'a':'r')+'">'+m.v+'%</td>'+
          '<td class="'+(m.nota>=8?'g':m.nota>=6.5?'a':'r')+'">'+m.nota.toFixed(1)+'</td></tr>'
        ).join('')+'</tbody></table>';
    }
    // ── GRAHAM ATLETA ────────────────────────────────────
    if (tab==='GRAHAM') {
      const vpiCalc = IND.VPI._calcAthlete(a);
      // Valor intrínseco do atleta: cláusula rescisória é o "preço de mercado"
      // Comparamos com valor calculado pelo VPI
      const clauseVal = parseFloat((a.clause||'0').replace(/[^0-9.]/g,'')) || 50;
      const salMensal = parseFloat((a.sal||'0').replace(/[^0-9.]/g,'')) || 0;
      const salAnual  = salMensal * 12;
      // EPS esportivo = (gols*2 + ass) / partidas / salário anual
      const partidas  = Math.max(a.min/90, 1);
      const eps       = ((a.gols*2+a.ass)/partidas) / Math.max(salAnual/1000000,1);
      const G         = Math.max((vpiCalc - a.vpi)*0.5, 0);
      const Y         = 0.1375; // SELIC
      const VI        = eps * (8.5 + 2*G) * (0.044/Y);
      const viNorm    = Math.min(Math.max(vpiCalc * (1 + VI*0.1), 40), 150);
      const margin    = ((viNorm - clauseVal/10) / viNorm * 100);
      const marginCol = margin>30?'var(--g1)':margin>10?'var(--a1)':'var(--r1)';
      const checklist = [
        {item:'VPI > 75%',         pass:vpiCalc>75},
        {item:'PBI < 25%',         pass:a.pbi<25},
        {item:'Gols/90 > 0.3',     pass:(a.gols/partidas)>0.3},
        {item:'Minutos > 2000',    pass:a.min>2000},
        {item:'Idade < 30',        pass:a.age<30},
        {item:'Contrato > 1 ano',  pass:true},
        {item:'Cláusula definida', pass:!!a.clause && a.clause!=='—'},
      ];
      const score = checklist.filter(c=>c.pass).length;
      return '<div class="sec">GRAHAM — VALOR INTRÍNSECO DO ATLETA ◆ PROFESSIONAL+</div>'+
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">'+
        [
          {lbl:'VPI CALCULADO',val:vpiCalc+'%',col:vpiCalc>=75?'var(--g1)':'var(--a1)'},
          {lbl:'VALOR INTRÍNSECO',val:viNorm.toFixed(1),col:marginCol},
          {lbl:'MARGEM SEGURANÇA',val:margin.toFixed(1)+'%',col:marginCol},
          {lbl:'SCORE GRAHAM',val:score+'/7',col:score>=5?'var(--g1)':score>=3?'var(--a1)':'var(--r1)'},
        ].map(it=>'<div class="card-dark"><div class="dim" style="font-size:6.5px">'+it.lbl+'</div>'+
          '<div style="font-size:18px;font-weight:700;font-family:var(--fu);color:'+it.col+'">'+it.val+'</div></div>'
        ).join('')+'</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
        '<div><div class="sec">CHECKLIST GRAHAM</div>'+
        checklist.map(c=>'<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--b0)">'+
          '<span style="color:'+(c.pass?'var(--g1)':'var(--r1)');}'>'+(c.pass?'✓':'✗')+'</span>'+
          '<span style="font-size:9px;color:var(--t2)">'+c.item+'</span></div>'
        ).join('')+'</div>'+
        '<div><div class="sec">PARÂMETROS DO MODELO</div>'+
        '<table class="ft">'+
        '<tr><td>EPS Esportivo</td><td class="g">'+eps.toFixed(3)+'</td><td></td></tr>'+
        '<tr><td>G (crescimento VPI)</td><td class="a">'+G.toFixed(2)+'</td><td></td></tr>'+
        '<tr><td>Y (SELIC)</td><td class="dim">13.75%</td><td></td></tr>'+
        '<tr><td>Cláusula rescisória</td><td class="r">'+a.clause+'</td><td></td></tr>'+
        '<tr><td>Salário mensal</td><td class="dim">'+a.sal+'</td><td></td></tr>'+
        '<tr><td>Gols/90min</td><td class="g">'+(a.gols/partidas).toFixed(2)+'</td><td></td></tr>'+
        '</table></div></div>';
    }

    // ── BUFFETT ATLETA ────────────────────────────────────
    if (tab==='BUFFETT') {
      const vpiCalc = IND.VPI._calcAthlete(a);
      // MOAT do atleta: habilidade única + marca + contrato + saúde
      const marcaN  = Math.min(a.vpi * 1.1, 100); // VPI como proxy de marca
      const saudeN  = Math.max(100 - a.pbi*2, 0); // saúde = inverso do PBI
      const idadeN  = Math.max(100 - Math.max(a.age-24,0)*5, 20); // penalizar acima de 24
      const ctrN    = 80; // assumir contrato ativo
      const unicN   = Math.min((a.vel||70)*0.3 + (a.tec||70)*0.5 + (a.cri||70)*0.2, 100);
      const moat    = Math.round(0.25*marcaN + 0.25*saudeN + 0.20*idadeN + 0.15*ctrN + 0.15*unicN);
      const label   = moat>75?'WIDE MOAT':moat>55?'NARROW MOAT':'NO MOAT';
      return '<div class="sec">BUFFETT — MOAT DO ATLETA ◆ DIAMOND</div>'+
        '<div style="display:grid;grid-template-columns:180px 1fr;gap:12px;margin-bottom:10px">'+
          gaugeRingSimple(moat,'var(--p1)','MOAT\n'+moat) +
          '<div><div class="sec" style="margin-top:0">COMPONENTES DO MOAT</div>'+
          [
            {lbl:'MARCA (VPI proxy)',    v:Math.round(marcaN)},
            {lbl:'SAÚDE (1-PBI)',        v:Math.round(saudeN)},
            {lbl:'JANELA ETÁRIA',        v:Math.round(idadeN)},
            {lbl:'CONTRATO ATIVO',       v:ctrN},
            {lbl:'HABILIDADE ÚNICA',     v:Math.round(unicN)},
          ].map(c=>{
            const col=c.v>75?'var(--g1)':c.v>55?'var(--a1)':'var(--r1)';
            return '<div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid var(--b0)">'+
              '<span style="width:140px;font-size:8px;font-family:var(--fu);color:var(--t4)">'+c.lbl+'</span>'+
              '<div style="flex:1;height:3px;background:var(--bg0);border-radius:2px">'+
              '<div style="width:'+c.v+'%;height:100%;background:'+col+';border-radius:2px"></div></div>'+
              '<span style="width:28px;text-align:right;font-family:var(--fm);font-size:9px;color:'+col+'">'+c.v+'</span></div>';
          }).join('')+
          '<div style="margin-top:8px;padding:6px;background:var(--bg0);border:1px solid var(--b1)">'+
          '<span style="font-size:8px;font-family:var(--fu);font-weight:700;color:var(--p1)">'+label+'</span>'+
          '</div></div>'+
        '</div>';
    }

    // ── BLACKROCK ATLETA ──────────────────────────────────
    if (tab==='BLACKROCK') {
      const clauseVal = parseFloat((a.clause||'100').replace(/[^0-9.]/g,'')) || 100;
      // Riscos específicos do atleta
      const riskAge   = Math.max(0, (a.age-28)*4);     // > 28 anos = risco crescente
      const riskInj   = (a.inj||[]).length * 8;         // lesões históricas
      const riskPBI   = Math.max(0, a.pbi-15) * 1.5;   // PBI acima de 15 = risco
      const riskCtr   = a.clause==='—' ? 20 : 5;        // sem cláusula = risco
      const riskFX    = a.nat!=='Brasil' ? 12 : 4;      // atleta estrangeiro = FX risk
      const total     = Math.min(riskAge+riskInj+riskPBI+riskCtr+riskFX, 100);
      const label     = total<20?'LOW':total<40?'MEDIUM':total<60?'HIGH':'CRITICAL';
      const col       = total<20?'var(--g1)':total<40?'var(--a1)':total<60?'var(--or)':'var(--r1)';
      const fatores   = [
        {lbl:'β IDADE',     v:Math.round(riskAge),  note:'Acima de 28 anos'},
        {lbl:'β LESÃO',     v:Math.round(riskInj),  note:(a.inj||[]).length+' episódios'},
        {lbl:'β PBI',       v:Math.round(riskPBI),  note:'Desgaste acumulado'},
        {lbl:'β CONTRATO',  v:riskCtr,               note:a.ctr||'—'},
        {lbl:'β CÂMBIO',    v:riskFX,                note:a.nat},
      ];
      return '<div class="sec">BLACKROCK — RISCO DO ATLETA ◆ DIAMOND</div>'+
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px">'+
        [
          {lbl:'RISK SCORE',v:total.toFixed(1),   c:col},
          {lbl:'NÍVEL',     v:label,               c:col},
          {lbl:'LESÕES',    v:(a.inj||[]).length+' ep.',c:(a.inj||[]).length>1?'var(--r1)':'var(--g1)'},
        ].map(it=>'<div class="card-dark"><div class="dim" style="font-size:6.5px">'+it.lbl+'</div>'+
          '<div style="font-size:18px;font-weight:700;font-family:var(--fu);color:'+it.c+'">'+it.v+'</div></div>'
        ).join('')+'</div>'+
        '<div class="sec">FATORES DE RISCO</div>'+
        fatores.map(f=>{
          const fc=f.v<10?'var(--g1)':f.v<25?'var(--a1)':'var(--r1)';
          return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--b0)">'+
            '<span style="width:90px;font-size:8px;font-family:var(--fu);color:var(--t4)">'+f.lbl+'</span>'+
            '<div style="flex:1;height:4px;background:var(--bg0);border-radius:2px">'+
            '<div style="width:'+Math.min(f.v*2,100)+'%;height:100%;background:'+fc+';border-radius:2px"></div></div>'+
            '<span style="width:28px;text-align:right;font-family:var(--fm);font-size:9px;color:'+fc+'">'+f.v+'</span>'+
            '<span style="width:100px;font-size:8px;color:var(--t5);text-align:right">'+f.note+'</span></div>';
        }).join('')+
        '<div class="card" style="margin-top:8px;font-size:9px;color:var(--t2);line-height:1.7">'+
        '<b class="a">Cláusula rescisória:</b> '+a.clause+'<br>'+
        '<b class="a">Exposição cambial:</b> '+(a.nat!=='Brasil'?'Alta — atleta estrangeiro':'Baixa — atleta nacional')+'<br>'+
        '<b class="'+(total<40?'g':'r')+'">Recomendação:</b> '+(total<20?'Exposição segura':total<40?'Monitorar PBI':'Reduzir exposição — risco elevado')+
        '</div>';
    }

    // ── NASH ATLETA ───────────────────────────────────────
    if (tab==='NASH') {
      const matches = a.matches||[];
      const wins    = matches.filter(m=>{const[g,ga]=m.pl.split('-').map(Number);return g>ga;}).length;
      const domN    = matches.length?(wins/matches.length*100):50;
      const vpis    = matches.map(m=>m.v||a.vpi);
      const meanVPI = vpis.length?vpis.reduce((s,v)=>s+v,0)/vpis.length:a.vpi;
      const stdVPI  = vpis.length>1?Math.sqrt(vpis.reduce((s,v)=>s+(v-meanVPI)**2,0)/vpis.length):3;
      const stabN   = Math.max(0,(1-stdVPI/meanVPI)*100);
      // Posicionamento estratégico: diversidade de métricas
      const attrVals= [a.vel||70,a.tec||70,a.fis||70,a.men||70,a.tat||70,a.cri||70];
      const attrMean= attrVals.reduce((s,v)=>s+v,0)/attrVals.length;
      const posN    = Math.min(attrMean, 100);
      const nash    = Math.round(0.35*domN + 0.40*stabN + 0.25*posN);
      const label   = nash>75?'POSIÇÃO DOMINANTE':nash>55?'EQUILÍBRIO ESTÁVEL':'ABAIXO DO EQUILÍBRIO';
      return '<div class="sec">NASH — POSICIONAMENTO ESTRATÉGICO ◆ DIAMOND</div>'+
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">'+
        [
          {lbl:'NASH SCORE',   v:nash,             c:nash>75?'var(--g1)':nash>55?'var(--a1)':'var(--r1)'},
          {lbl:'DOMINÂNCIA',   v:Math.round(domN), c:'var(--g2)'},
          {lbl:'ESTABILIDADE', v:Math.round(stabN),c:'var(--c1)'},
          {lbl:'POSICIONAMENTO',v:Math.round(posN),c:'var(--a1)'},
        ].map(it=>'<div class="card-dark"><div class="dim" style="font-size:6.5px">'+it.lbl+'</div>'+
          '<div style="font-size:18px;font-weight:700;font-family:var(--fu);color:'+it.c+'">'+it.v+'</div>'+
          '<div style="height:2px;background:var(--bg0);border-radius:1px;margin-top:4px">'+
          '<div style="width:'+it.v+'%;height:100%;background:'+it.c+';border-radius:1px"></div></div></div>'
        ).join('')+'</div>'+
        '<div class="card" style="font-size:9px;color:var(--t2);line-height:1.8">'+
        '<b class="p">Equilíbrio Nash aplicado:</b> '+label+'<br>'+
        'O atleta <b class="g">'+a.n+'</b> está em posição estratégica '+
        (nash>75?'ótima — nenhum concorrente pode melhorar sem que ele responda adequadamente.':
         nash>55?'estável — mantém competitividade dentro do seu nicho posicional.':
         'subótima — existe espaço para melhoria técnica ou física sem resposta do mercado.')+
        '<br><b class="a">Dominância:</b> '+(matches.length?`${wins}/${matches.length} jogos com equipe vencedora`:'dados limitados')+
        '<br><b class="a">Consistência VPI:</b> desvio padrão '+stdVPI.toFixed(1)+' — '+(stdVPI<3?'excelente':'monitorar')+
        '</div>';
    }

    // ── JUNG ATLETA ───────────────────────────────────────
    if (tab==='JUNG') {
      // Tipo baseado no perfil do atleta
      const ei = (a.vel||70) > 80 ? 'E' : 'I';             // velocidade alta = extrovertido
      const sn = (a.tec||70) > 80 ? 'N' : 'S';             // técnica alta = intuitivo
      const tf = a.pbi < 20 ? 'T' : 'F';                   // baixo PBI = thinking (eficiente)
      const jp = a.min > 2500 ? 'J' : 'P';                 // muitos minutos = estruturado
      const tipo= ei+sn+tf+jp;
      const arqs={
        ENTJ:'O Comandante',INTJ:'O Arquiteto',ENTP:'O Inventor',INTP:'O Lógico',
        ENFJ:'O Protagonista',INFJ:'O Advogado',ENFP:'O Campeão',INFP:'O Mediador',
        ESTJ:'O Executivo',ISTJ:'O Logístico',ESTP:'O Empreendedor',ISTP:'O Virtuoso',
        ESFJ:'O Cônsul',ISFJ:'O Defensor',ESFP:'O Animador',ISFP:'O Aventureiro',
      };
      const arq = arqs[tipo]||'O Estrategista';
      const descs={
        ENTJ:'Liderança natural. Vence por imposição tática. Alta performance sob pressão.',
        INTJ:'Estratégico. Resolve problemas complexos. Menos emocional.',
        ENTP:'Criativo e imprevisível. Difícil de marcar. Inovador taticamente.',
        ENFJ:'Líder carismático. Eleva o nível do time. Alta inteligência emocional.',
        ESTJ:'Consistente e disciplinado. Motor da equipe. Nunca falta.',
        ISTP:'Técnico puro. Executar sob qualquer circunstância.',
        ESFP:'Show man. Melhor quando tem plateia. Decisivo em momentos grandes.',
        INFJ:'Raro. Combina visão e execução de forma única.',
      };
      const desc = descs[tipo]||'Perfil equilibrado. Adaptável a diferentes sistemas.';
      const dims =[
        {a:'E',b:'I',v:ei,la:'Extrovertido (bola sempre)',lb:'Introvertido (seletivo)'},
        {a:'S',b:'N',v:sn,la:'Sensorial (concreto)',     lb:'Intuitivo (criativo)'},
        {a:'T',b:'F',v:tf,la:'Racional (eficiente)',     lb:'Emocional (expressivo)'},
        {a:'J',b:'P',v:jp,la:'Estruturado (90min/jogo)', lb:'Flexível (rotativo)'},
      ];
      return '<div class="sec">JUNG — PERFIL PSICOMÉTRICO DO ATLETA ◆ DIAMOND</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px">'+
        '<div>'+
        '<div class="card-dark" style="text-align:center;padding:16px;margin-bottom:8px">'+
        '<div style="font-size:28px;font-weight:700;font-family:var(--fu);color:var(--p1);letter-spacing:4px">'+tipo+'</div>'+
        '<div style="font-size:11px;color:var(--t1);font-family:var(--fu);margin-top:4px">'+arq+'</div>'+
        '<div style="font-size:8px;color:var(--t4);margin-top:2px">'+a.pos+' · '+a.nat+'</div>'+
        '</div>'+
        '<div class="card" style="font-size:9px;color:var(--t2);line-height:1.6">'+desc+'</div>'+
        '</div>'+
        '<div><div class="sec" style="margin-top:0">DIMENSÕES</div>'+
        dims.map(d=>{
          const isA = d.v===d.a;
          return '<div style="margin-bottom:10px">'+
            '<div style="display:flex;justify-content:space-between;font-size:7.5px;font-family:var(--fu);color:var(--t4);margin-bottom:3px">'+
            '<span>'+(isA?'<b style="color:var(--p1)">':'')+d.la+(isA?'</b>':'')+'</span>'+
            '<span>'+(!isA?'<b style="color:var(--p1)">':'')+d.lb+(!isA?'</b>':'')+'</span></div>'+
            '<div style="height:8px;background:var(--bg0);border-radius:4px;position:relative;overflow:hidden">'+
            '<div style="position:absolute;'+(isA?'left:0':'right:0')+';width:65%;height:100%;background:var(--p1);opacity:.4;border-radius:4px"></div>'+
            '<div style="position:absolute;'+(isA?'left:10%':'right:10%')+';top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;font-family:var(--fu);color:var(--p1)">'+d.v+'</div>'+
            '</div></div>';
        }).join('')+'</div></div>';
    }

    // ── FEYNMANN ATLETA ───────────────────────────────────
    if (tab==='FEYNMANN') {
      const partidas = Math.max(a.min/90,1);
      const output   = a.gols*2 + a.ass + (a.vpi||70)*0.3;
      const input    = a.min * (1 + (a.pbi||20)/100);
      const entropy  = (a.inj||[]).length*0.15 + Math.max(0,a.pbi-15)*0.01;
      const penalty  = Math.max(1-entropy, 0.5);
      const eff      = input>0 ? (output/input*800*penalty) : 0;
      const effN     = Math.min(Math.max(eff,0),100);
      const label    = effN>75?'ÓTIMO':effN>55?'EFICIENTE':effN>35?'INEFICIENTE':'CRÍTICO';
      const effCol   = effN>75?'var(--g1)':effN>55?'var(--a1)':effN>35?'var(--or)':'var(--r1)';
      // Métricas por 90min
      const gols90 = (a.gols/partidas).toFixed(2);
      const ass90  = (a.ass/partidas).toFixed(2);
      const contrib90 = ((a.gols+a.ass)/partidas).toFixed(2);
      return '<div class="sec">FEYNMANN — EFICIÊNCIA FÍSICA DO ATLETA ◆ DIAMOND</div>'+
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px">'+
        [
          {lbl:'EFF SCORE',    v:effN.toFixed(1),     c:effCol},
          {lbl:'LABEL',        v:label,                c:effCol},
          {lbl:'OUTPUT TOTAL', v:Math.round(output),  c:'var(--g2)'},
          {lbl:'ENTROPY',      v:entropy.toFixed(2),  c:entropy<0.2?'var(--g1)':'var(--r1)'},
        ].map(it=>'<div class="card-dark"><div class="dim" style="font-size:6.5px">'+it.lbl+'</div>'+
          '<div style="font-size:18px;font-weight:700;font-family:var(--fu);color:'+it.c+'">'+it.v+'</div></div>'
        ).join('')+'</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
        '<div><div class="sec">MÉTRICAS POR 90 MIN</div>'+
        '<table class="ft">'+
        '<tr><td>Gols/90</td><td class="g" style="font-weight:700">'+gols90+'</td><td class="dim">'+(gols90>0.5?'Elite':'Regular')+'</td></tr>'+
        '<tr><td>Assistências/90</td><td class="a" style="font-weight:700">'+ass90+'</td><td class="dim">'+(ass90>0.3?'Elite':'Regular')+'</td></tr>'+
        '<tr><td>Contribuições/90</td><td class="g" style="font-weight:700">'+contrib90+'</td><td></td></tr>'+
        '<tr><td>Minutos totais</td><td class="dim">'+a.min+'</td><td></td></tr>'+
        '<tr><td>PBI (queima)</td><td class="'+(a.pbi>25?'r':'a')+'">'+a.pbi+'%</td><td></td></tr>'+
        '<tr><td>Episódios lesão</td><td class="'+(a.inj?.length>1?'r':'g')+'">'+(a.inj?.length||0)+'</td><td></td></tr>'+
        '</table></div>'+
        '<div><div class="sec">FÓRMULA FEYNMANN</div>'+
        '<div style="background:var(--bg0);border:1px solid var(--b2);padding:8px;border-left:2px solid var(--g3)">'+
        '<pre style="font-family:var(--fm);font-size:8px;color:var(--g3);white-space:pre-wrap">EFF = Output / Input × Penalty\n\nOutput  = '+Math.round(output)+'\nInput   = '+Math.round(input)+'\nEntropy = '+entropy.toFixed(3)+'\nPenalty = '+penalty.toFixed(3)+'\n\nEFF     = '+effN.toFixed(1)+'</pre>'+
        '</div></div></div>';
    }
    return '<div class="dim" style="padding:8px;font-size:10px">Tab <span class="a">'+tab+'</span> — em desenvolvimento.</div>';
  }

  function gaugeRingSimple(val, col, label) {
    const r=54, cx=70, cy=70, circ=2*Math.PI*r;
    const pct=Math.min(Math.max(val,0),100);
    const dash=circ*pct/100;
    const lines=label.split('\n');
    return '<div style="display:flex;flex-direction:column;align-items:center;padding:8px">'+
      '<svg width="140" height="140" viewBox="0 0 140 140">'+
        '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--bg2)" stroke-width="8"/>'+
        '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="8"'+
          ' stroke-dasharray="'+dash.toFixed(1)+' '+circ.toFixed(1)+'"'+
          ' stroke-linecap="butt" transform="rotate(-90 '+cx+' '+cy+')" opacity=".85"/>'+
        '<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" fill="'+col+'" font-size="18" font-weight="700" font-family="Rajdhani">'+Math.round(val)+'</text>'+
        (lines[1]?'<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" fill="var(--t4)" font-size="7" font-family="Rajdhani">'+lines[0]+'</text>'+
        '<text x="'+cx+'" y="'+(cy+23)+'" text-anchor="middle" fill="'+col+'" font-size="9" font-weight="700" font-family="Rajdhani">'+lines[1]+'</text>':
        '<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" fill="var(--t4)" font-size="8" font-family="Rajdhani">'+lines[0]+'</text>')+
      '</svg></div>';
  }

  function renderRadar(labels, values) {
    const N=labels.length, R=80, cx=100, cy=100;
    const pts = values.map((v,i)=>{ const ang=-Math.PI/2+i*2*Math.PI/N, r=v/100*R; return [cx+r*Math.cos(ang),cy+r*Math.sin(ang)]; });
    const gridLines = [3,5,7,10].map(g=>{
      const pct=g*10;
      return '<polygon points="'+Array.from({length:N},(_,i)=>{const ang=-Math.PI/2+i*2*Math.PI/N,r=pct/100*R;return (cx+r*Math.cos(ang)).toFixed(1)+','+(cy+r*Math.sin(ang)).toFixed(1)}).join(' ')+'" fill="none" stroke="var(--b2)" stroke-width="0.5"/>';
    }).join('');
    const axes = Array.from({length:N},(_,i)=>{const ang=-Math.PI/2+i*2*Math.PI/N;return '<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+R*Math.cos(ang)).toFixed(1)+'" y2="'+(cy+R*Math.sin(ang)).toFixed(1)+'" stroke="var(--b2)" stroke-width="0.5"/>';}).join('');
    const polygon = '<polygon points="'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')+'" fill="rgba(0,255,65,0.12)" stroke="var(--g1)" stroke-width="1.5"/>';
    const dots    = pts.map((p,i)=>'<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="2.5" fill="var(--g1)"><title>'+labels[i]+': '+values[i]+'</title></circle>').join('');
    const lbls    = labels.map((l,i)=>{const ang=-Math.PI/2+i*2*Math.PI/N,r=R+16,x=cx+r*Math.cos(ang),y=cy+r*Math.sin(ang);return '<text x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" fill="var(--t3)" font-size="7" font-family="var(--fu)" text-anchor="middle" dominant-baseline="middle">'+l+'</text>';}).join('');
    return '<svg viewBox="0 0 200 200" width="200" height="200" style="display:block;margin:0 auto">'+gridLines+axes+polygon+dots+lbls+'</svg>';
  }
}

  window.enviarAtletaParaVault = async function() {
    const btn = document.getElementById('btn-vault-a');
    if (btn) { btn.textContent = '⏳...'; btn.disabled = true; }
    try {
      const teamData = SIT_DB.DB[teamKey];
      // Buscar sentimento
      let sentimento = null;
      if (window.NEWS) {
        try { sentimento = await NEWS.buscarAtleta(a.n, teamData?.n || teamKey); }
        catch(e) {}
      }
      // Serializar
      const payload = VAULT_BRIDGE.serializarAtleta(teamKey, a, teamData, sentimento);
      const resp    = await VAULT_BRIDGE.analisar(payload);
      // Cachear
      const cacheKey = 'sit_vault_resp_'+teamKey+'_'+encodeURIComponent(a.n);
      localStorage.setItem(cacheKey, JSON.stringify(resp));
      // Navegar
      loadTab('VAULT');
    } catch(e) {
      alert('Erro: ' + e.message);
    } finally {
      if (btn) { btn.textContent = '⬆ VAULT'; btn.disabled = false; }
    }
  };

</script>
