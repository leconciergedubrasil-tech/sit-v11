<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><title>SIT · H2H</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sit-shell.css">
<style>
.h2h-split{display:grid;grid-template-columns:1fr 80px 1fr;gap:0;align-items:start;flex:1;overflow-y:auto;padding:10px 12px}
.h2h-col{display:flex;flex-direction:column;gap:6px}
.h2h-mid{display:flex;flex-direction:column;align-items:center;gap:4px;padding-top:8px}
.vs{font-size:22px;font-weight:700;color:var(--b3);font-family:var(--fu)}
.h2h-metric{font-size:8px;color:var(--t4);font-family:var(--fu);text-align:center;margin-top:8px}
.h2h-bar{display:flex;height:16px;border-radius:2px;overflow:hidden;margin-bottom:2px}
.h2h-bar-a{background:var(--g2);transition:width .4s}
.h2h-bar-b{background:var(--r1);transition:width .4s;margin-left:auto}
.pick-wrap{display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--b2);flex-shrink:0}
.pick-wrap select{background:var(--bg0);border:1px solid var(--b2);color:var(--g1);font-family:var(--fu);font-size:10px;padding:4px 8px;flex:1;outline:none}
</style>
</head>
<body class="sit-layout">
<div id="header"></div>
<div class="sit-body">
  <div class="nav-lateral">
    <div class="nav-section">
      <div class="nav-sec-hd">Funções</div>
      <div class="nav-item" onclick="SIT.go('MON')"><span>◉</span><span>MONITOR</span></div>
      <div class="nav-item active" onclick="SIT.go('H2H')"><span>⇄</span><span>HEAD-TO-HEAD</span></div>
      <div class="nav-item" onclick="SIT.go('COPA')"><span>🏆</span><span>COPA 2026</span></div>
      <div class="nav-item" onclick="SIT.go('MRKT')"><span>↔</span><span>MERCADO</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-sec-hd">Times</div>
      <div id="nav-teams"></div>
    </div>
  </div>
  <div class="sit-content">
    <div style="background:var(--bg0);padding:8px 14px;border-bottom:1px solid var(--b3);display:flex;align-items:center;gap:10px;flex-shrink:0">
      <span style="font-size:18px;font-weight:700;color:var(--a1);font-family:var(--fu);letter-spacing:1px">H2H</span>
      <span style="font-size:10px;color:var(--t2);font-family:var(--fu)">HEAD-TO-HEAD · ANÁLISE COMPARATIVA</span>
      <button onclick="window.history.back()" style="margin-left:auto;padding:3px 8px;font-size:8px;border:1px solid var(--b2);background:transparent;color:var(--g2);cursor:pointer;font-family:var(--fu)">← BACK</button>
    </div>
    <div class="pick-wrap">
      <label style="font-size:8px;color:var(--t4);font-family:var(--fu);align-self:center">TIME A</label>
      <select id="sel-t1" onchange="reloadH2H()"></select>
      <label style="font-size:8px;color:var(--t4);font-family:var(--fu);align-self:center">VS</label>
      <select id="sel-t2" onchange="reloadH2H()"></select>
      <button onclick="reloadH2H()" style="padding:4px 14px;font-size:9px;border:1px solid var(--g2);background:rgba(0,255,65,.1);color:var(--g1);cursor:pointer;font-family:var(--fu);font-weight:700">ANALISAR &lt;GO&gt;</button>
    </div>
    <div class="h2h-split" id="h2h-body"></div>
  </div>
</div>
<div id="statusbar"></div>
<script src="sit-db.js"></script>
<script src="sit-core.js"></script>
<script src="sit-supabase.js"></script>
<script>
const params  = new URLSearchParams(window.location.search);
const session = SIT.boot('H2H');
if (session) {
  SIT.setBreadcrumb([{label:'MON',href:'MON'},{label:'H2H'}]);
  const db   = SIT_DB.DB;
  const keys = Object.keys(db);
  const t1def = (params.get('t1')||'FLA').toUpperCase();
  const t2def = (params.get('t2')||'RM').toUpperCase();

  const opts = keys.map(k=>'<option value="'+k+'">'+db[k].tk+' — '+db[k].n+'</option>').join('');
  document.getElementById('sel-t1').innerHTML = opts;
  document.getElementById('sel-t2').innerHTML = opts;
  document.getElementById('sel-t1').value = keys.includes(t1def)?t1def:keys[0];
  document.getElementById('sel-t2').value = keys.includes(t2def)?t2def:keys[1];

  document.getElementById('nav-teams').innerHTML = keys.map(k=>{
    const col = db[k].chgN>0?'tup':'tdn';
    return '<div class="nav-item" onclick="SIT.go(\''+k+'\')">'+
      '<span style="font-size:8px">●</span><span style="flex:1">'+db[k].tk+'</span>'+
      '<span class="nav-item-val '+col+'" style="font-size:8px">'+db[k].vpi+'%</span></div>';
  }).join('');

  reloadH2H();

  function reloadH2H() {
    const k1 = document.getElementById('sel-t1').value;
    const k2 = document.getElementById('sel-t2').value;
    history.replaceState(null,'','h2h.html?t1='+k1+'&t2='+k2);
    const t1 = db[k1], t2 = db[k2];
    if (!t1||!t2) return;
    document.title = 'SIT · H2H · '+t1.tk+' vs '+t2.tk;

    const metrics = [
      {label:'VPI %',     a:t1.vpi,   b:t2.vpi,   fmt:v=>v+'%', higher:true},
      {label:'PBI %',     a:t1.pbi,   b:t2.pbi,   fmt:v=>v+'%', higher:false},
      {label:'SCORE',     a:parseFloat(t1.score),b:parseFloat(t2.score),fmt:v=>v, higher:true},
      {label:'TDM',       a:t1.tdm==='GOLDEN'?1:0,b:t2.tdm==='GOLDEN'?1:0,fmt:(_,raw)=>raw.tdm||'—',higher:true,raw:true},
      {label:'ELENCO Nº', a:t1.athletes.length, b:t2.athletes.length, fmt:v=>v+' atl.', higher:true},
      {label:'VPI MÉD.',  a:+(t1.athletes.reduce((s,a)=>s+a.vpi,0)/Math.max(1,t1.athletes.length)).toFixed(1),
                          b:+(t2.athletes.reduce((s,a)=>s+a.vpi,0)/Math.max(1,t2.athletes.length)).toFixed(1), fmt:v=>v+'%', higher:true},
      {label:'RATING',    a:t1.rating==='BUY'?3:t1.rating==='HOLD'?2:1, b:t2.rating==='BUY'?3:t2.rating==='HOLD'?2:1, fmt:(_,orig)=>orig.rating, higher:true, raw:true},
    ];

    const rows = metrics.map(m=>{
      const va = m.raw ? m.a : m.a;
      const vb = m.raw ? m.b : m.b;
      const aWins = m.higher ? va > vb : va < vb;
      const bWins = m.higher ? vb > va : vb < va;
      const total = Math.max(va+vb, 0.01);
      const pctA = Math.round(va/total*100);
      const pctB = 100-pctA;
      const fa = m.raw ? (m.label==='TDM'?(va?t1.tdm:t1.tdm):(t1.rating)) : m.fmt(va);
      const fb = m.raw ? (m.label==='TDM'?(vb?t2.tdm:t2.tdm):(t2.rating)) : m.fmt(vb);
      return '<tr>'+
        '<td class="'+(aWins?'g':bWins?'r':'a')+'" style="text-align:right;font-weight:700">'+fa+'</td>'+
        '<td class="dim" style="text-align:center;font-size:8px">'+m.label+'</td>'+
        '<td class="'+(bWins?'g':aWins?'r':'a')+'" style="font-weight:700">'+fb+'</td></tr>'+
        '<tr><td colspan="3" style="padding:0 0 6px"><div class="h2h-bar">'+
        '<div class="h2h-bar-a" style="width:'+pctA+'%"></div>'+
        '<div class="h2h-bar-b" style="width:'+pctB+'%"></div></div></td></tr>';
    }).join('');

    const rc1=t1.rating==='BUY'?'buy':t1.rating==='SELL'?'sell':'hold';
    const rc2=t2.rating==='BUY'?'buy':t2.rating==='SELL'?'sell':'hold';
    const winner = t1.vpi>t2.vpi?t1:t2;

    document.getElementById('h2h-body').innerHTML =
      '<div class="h2h-col">'+
        '<div class="card-dark" style="text-align:center">'+
          '<div style="font-size:20px;font-weight:700;color:var(--a1);font-family:var(--fu);letter-spacing:1px">'+t1.tk+'</div>'+
          '<div style="font-size:10px;color:var(--t2);margin:4px 0">'+t1.n+'</div>'+
          '<span class="bg '+rc1+'">'+t1.rating+' '+t1.score+'</span>'+
        '</div>'+
        '<div class="card-dark" onclick="window.location.href=\'team.html?team='+k1+'\'" style="cursor:pointer">'+
          '<div class="dim" style="font-size:7px">VPI</div><div class="big g">'+t1.vpi+'%</div>'+
        '</div>'+
        '<div class="card" style="font-size:9px;color:var(--t2);line-height:1.6">'+
          '<b>Liga:</b> '+t1.liga+'<br><b>Estádio:</b> '+t1.stadium+'<br><b>Técnico:</b> '+t1.coach+
        '</div>'+
        '<button onclick="window.location.href=\'team.html?team='+k1+'\'" style="padding:6px;font-size:9px;border:1px solid var(--g2);background:rgba(0,255,65,.1);color:var(--g1);cursor:pointer;font-family:var(--fu)">ABRIR DOSSIÊ '+t1.tk+'</button>'+
      '</div>'+
      '<div class="h2h-mid">'+
        '<div class="vs">VS</div>'+
        '<table class="dt" style="margin-top:8px">'+rows+'</table>'+
        '<div class="card-dark" style="text-align:center;margin-top:8px">'+
          '<div class="dim" style="font-size:7px">VANTAGEM</div>'+
          '<div style="font-size:14px;font-weight:700;color:var(--g1);font-family:var(--fu)">'+winner.tk+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="h2h-col">'+
        '<div class="card-dark" style="text-align:center">'+
          '<div style="font-size:20px;font-weight:700;color:var(--a1);font-family:var(--fu);letter-spacing:1px">'+t2.tk+'</div>'+
          '<div style="font-size:10px;color:var(--t2);margin:4px 0">'+t2.n+'</div>'+
          '<span class="bg '+rc2+'">'+t2.rating+' '+t2.score+'</span>'+
        '</div>'+
        '<div class="card-dark" onclick="window.location.href=\'team.html?team='+k2+'\'" style="cursor:pointer">'+
          '<div class="dim" style="font-size:7px">VPI</div><div class="big g">'+t2.vpi+'%</div>'+
        '</div>'+
        '<div class="card" style="font-size:9px;color:var(--t2);line-height:1.6">'+
          '<b>Liga:</b> '+t2.liga+'<br><b>Estádio:</b> '+t2.stadium+'<br><b>Técnico:</b> '+t2.coach+
        '</div>'+
        '<button onclick="window.location.href=\'team.html?team='+k2+'\'" style="padding:6px;font-size:9px;border:1px solid var(--g2);background:rgba(0,255,65,.1);color:var(--g1);cursor:pointer;font-family:var(--fu)">ABRIR DOSSIÊ '+t2.tk+'</button>'+
      '</div>';
  }
  window.reloadH2H = reloadH2H;
}
</script>
</body>
</html>
