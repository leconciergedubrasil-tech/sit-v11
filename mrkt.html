<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><title>SIT · MERCADO</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sit-shell.css">
</head>
<body class="sit-layout">
<div id="header"></div>
<div class="sit-body">
  <div class="nav-lateral">
    <div class="nav-section">
      <div class="nav-sec-hd">Funções</div>
      <div class="nav-item" onclick="SIT.go('MON')"><span>◉</span><span>MONITOR</span></div>
      <div class="nav-item" onclick="SIT.go('COPA')"><span>🏆</span><span>COPA 2026</span></div>
      <div class="nav-item" onclick="SIT.go('H2H')"><span>⇄</span><span>H2H</span></div>
      <div class="nav-item active"><span>■</span><span>MERCADO</span></div>
      <div class="nav-item" onclick="SIT.go('HELP')"><span>?</span><span>HELP</span></div>
    </div>
    <div class="nav-section"><div class="nav-sec-hd">Times</div><div id="nav-teams"></div></div>
  </div>
  <div class="sit-content">
    <div style="background:var(--bg0);padding:8px 14px;border-bottom:1px solid var(--b3);display:flex;align-items:center;gap:10px;flex-shrink:0">
      <span style="font-size:18px;font-weight:700;color:var(--a1);font-family:var(--fu)">MERCADO</span>
      <button onclick="window.history.back()" style="margin-left:auto;padding:3px 8px;font-size:8px;border:1px solid var(--b2);background:transparent;color:var(--g2);cursor:pointer;font-family:var(--fu)">← BACK</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:10px 12px" id="main-content">
      <div class="sec">TRANSFERÊNCIAS — MAESTRO CALL</div><div id="mrkt-list"></div><div class="sec" style="margin-top:8px">INDICADORES DE MERCADO</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px"><div class="card-dark"><div class="dim" style="font-size:7px">VALOR MÉDIO JOGADOR BRA</div><div class="big" style="font-size:14px">€42M</div></div><div class="card-dark"><div class="dim" style="font-size:7px">DIREITOS STREAMING</div><div class="big g" style="font-size:14px">USD 2.1B</div></div><div class="card-dark"><div class="dim" style="font-size:7px">COTA LIBERTADORES</div><div class="big a" style="font-size:14px">USD 23M</div></div></div>
    </div>
  </div>
</div>
<div id="statusbar"></div>
<script src="sit-db.js"></script>
<script src="sit-core.js"></script>
<script src="sit-supabase.js"></script>
<script>
const session = SIT.boot('MERCADO');
if (session) {
  SIT.setBreadcrumb([{label:'MON',href:'MON'},{label:'MERCADO'}]);
  const db = SIT_DB.DB;
  // Nav teams
  document.getElementById('nav-teams').innerHTML = Object.entries(db).map(([k,t])=>
    '<div class="nav-item" onclick="SIT.go(\''+k+'\')"><span class="'+(t.rating==='BUY'?'g':t.rating==='SELL'?'r':'a')+'" style="font-size:8px">●</span><span style="flex:1">'+t.tk+'</span><span class="nav-item-val '+(t.chgN>0?'tup':'tdn')+'" style="font-size:8px">'+t.vpi+'%</span></div>'
  ).join('');
  // Page-specific init
  if (document.getElementById('fave-teams')) {
    const f = SIT.getFaves();
    document.getElementById('fave-teams').innerHTML = f.teams.length
      ? f.teams.map(k=>'<div class="nav-item" onclick="SIT.go(\''+k+'\')"><span class="g" style="font-size:8px">★</span><span>'+k+'</span></div>').join('')
      : '<div class="dim" style="font-size:9px;padding:6px">Nenhum time favoritado ainda.</div>';
    document.getElementById('fave-athletes').innerHTML = f.athletes.length
      ? f.athletes.map(a=>'<div class="nav-item" onclick="SIT.go(\''+a.replace(\'/\',\'/\')+'\')"><span class="a" style="font-size:8px">★</span><span>'+a+'</span></div>').join('')
      : '<div class="dim" style="font-size:9px;padding:6px">Nenhum atleta favoritado ainda.</div>';
  }
  if (document.getElementById('mrkt-list')) {
    document.getElementById('mrkt-list').innerHTML = SIT_DB.MAESTRO.map(m=>{
      const rc=m.r==='BUY'?'buy':m.r==='SELL'?'sell':'hold';
      return '<div class="card" style="display:flex;align-items:center;gap:10px;margin-bottom:4px">'+
        '<span class="bg '+rc+'">'+m.r+'</span>'+
        '<span class="dim" style="font-family:var(--fu);font-weight:600;width:80px">'+m.tk+'</span>'+
        '<span style="font-size:9px;color:var(--t2);flex:1">'+m.d+'</span>'+
        '<span class="a" style="font-size:9px;white-space:nowrap">'+m.s+'</span></div>';
    }).join('');
  }
}
</script>
</body>
</html>
