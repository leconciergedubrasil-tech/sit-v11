<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00ff41">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/icon.svg">
<meta charset="UTF-8"><title>SIT · MRKT</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sit-shell.css">
<style>
.mrkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1);flex:1;overflow:hidden}
.mrkt-panel{background:var(--bg1);display:flex;flex-direction:column;overflow:hidden}
.trans-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--b0);font-size:9px;cursor:pointer;transition:background .1s}
.trans-row:hover{background:rgba(0,255,65,.02)}
.trans-player{flex:1;color:var(--t1);font-family:var(--fu);font-size:9px}
.trans-from{font-size:8px;color:var(--t4);width:52px;text-align:center;flex-shrink:0}
.trans-arrow{color:var(--a1);flex-shrink:0}
.trans-to{font-size:8px;color:var(--t2);width:52px;text-align:center;flex-shrink:0}
.trans-val{font-family:var(--fm);font-weight:700;width:60px;text-align:right;flex-shrink:0}
.trans-pos{font-size:7px;font-family:var(--fu);font-weight:700;padding:1px 4px;border:1px solid var(--b2);color:var(--t4);flex-shrink:0}
.odds-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--b0);font-size:9px}
.odds-team{font-family:var(--fu);font-weight:700;color:var(--a1);width:52px;font-size:8.5px;flex-shrink:0}
.odds-comp{flex:1;color:var(--t3);font-size:8px}
.odds-val{font-family:var(--fm);font-weight:700;color:var(--g1);width:36px;text-align:right;flex-shrink:0}
.odds-mv{font-family:var(--fm);font-size:8px;width:44px;text-align:right;flex-shrink:0}
.window-badge{font-size:7px;font-family:var(--fu);font-weight:700;padding:1px 5px;border:1px solid}
.window-open{color:var(--g1);border-color:var(--g3);background:rgba(0,255,65,.06)}
.window-closed{color:var(--r1);border-color:var(--r2);background:rgba(255,51,51,.06)}
</style>
</head>
<body class="sit-layout">
<div id="header"></div>
<div class="sit-body">
  <div class="nav-lateral">
    <div class="nav-section">
      <div class="nav-sec-hd">Funções</div>
      <div class="nav-item" onclick="SIT.go('MON')"><span class="t3">◉</span><span>MONITOR</span></div>
      <div class="nav-item active"><span class="t3">↔</span><span>MRKT · MERCADO</span></div>
      <div class="nav-item" onclick="SIT.go('ECO')"><span class="t3">≡</span><span>ECO · MACRO</span></div>
      <div class="nav-item" onclick="SIT.go('FX')"><span class="t3">$</span><span>FX · CÂMBIO</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-sec-hd">Por Liga</div>
      <div class="nav-item" onclick="filterLiga('BRA')"><span class="t3">🇧🇷</span><span>Brasileirão</span></div>
      <div class="nav-item" onclick="filterLiga('ESP')"><span class="t3">🇪🇸</span><span>La Liga</span></div>
      <div class="nav-item" onclick="filterLiga('UK')"><span class="t3">🏴󠁧󠁢󠁥󠁮󠁧󠁿</span><span>Premier League</span></div>
      <div class="nav-item" onclick="filterLiga('SAU')"><span class="t3">🇸🇦</span><span>Saudi Pro</span></div>
      <div class="nav-item" onclick="filterLiga(null)"><span class="t3">🌍</span><span>Todos</span></div>
    </div>
  </div>

  <div class="sit-content">
    <div style="background:var(--bg0);padding:6px 12px;border-bottom:1px solid var(--b3);display:flex;align-items:center;gap:8px;flex-shrink:0">
      <span style="font-size:18px;font-weight:700;color:var(--a1);font-family:var(--fu)">MRKT</span>
      <span style="font-size:9px;color:var(--t3);font-family:var(--fu)">MERCADO DE TRANSFERÊNCIAS · ODDS · VALORES</span>
      <div style="margin-left:auto;display:flex;gap:4px">
        <span class="window-badge window-open">JAN 2026 ABERTA</span>
        <span style="font-size:8px;color:var(--t4);font-family:var(--fu);padding:1px 6px">Fecha: 31 Jan</span>
      </div>
      <button onclick="window.history.back()" style="padding:2px 8px;font-size:7.5px;border:1px solid var(--b2);background:transparent;color:var(--g2);cursor:pointer;font-family:var(--fu)">← BACK</button>
    </div>

    <div class="tabs-row">
      <button class="tab-btn on" onclick="showTab('trans',this)">TRANSFERÊNCIAS</button>
      <button class="tab-btn" onclick="showTab('odds',this)">ODDS APOSTAS</button>
      <button class="tab-btn" onclick="showTab('valores',this)">VALORES ELENCO</button>
      <button class="tab-btn" onclick="showTab('maestro',this)">MAESTRO CALLS</button>
      <button class="tab-btn" onclick="showTab('news',this)">NEWS</button>
    </div>

    <div style="flex:1;overflow-y:auto;padding:8px 12px" id="tcontent"></div>
  </div>
</div>
<div id="statusbar"></div>
<script src="sit-db.js"></script>
<script src="sit-indicators.js"></script>
<script src="sit-auth.js"></script>
<script src="sit-core.js"></script>
<script src="sit-panels.js"></script>
<script src="sit-news.js"></script>
<script src="sit-vault-bridge.js"></script>
<script src="sit-supabase.js"></script>
<script>
const session = SIT.boot('MRKT');
if (session) {
  AUTH.boot();
  SIT.setBreadcrumb([{label:'MON',href:'MON'},{label:'MRKT · MERCADO'}]);

  const db = SIT_DB.DB;

  // Transferências simuladas realistas
  const TRANSFERS = [
    {player:'Endrick',from:'Palmeiras',to:'Real Madrid',pos:'CA',val:'€60M',liga:'BRA→ESP',vpi:80,date:'Jan 2026'},
    {player:'Vinicius Jr',from:'Real Madrid',to:'Real Madrid',pos:'PE',val:'Renovação €20M/a',liga:'ESP',vpi:92,date:'Dez 2025'},
    {player:'Mbappé',from:'PSG',to:'Real Madrid',pos:'CA',val:'€0 (livre)',liga:'FR→ESP',vpi:88,date:'Jul 2025'},
    {player:'Rodri',from:'Man. City',to:'Man. City',pos:'MD',val:'Renovação €18M/a',liga:'UK',vpi:90,date:'Out 2025'},
    {player:'Neymar',from:'Al Hilal',to:'Al Nassr',pos:'PE',val:'€0 (livre)',liga:'SAU',vpi:70,date:'Jan 2026'},
    {player:'Bruno Guimarães',from:'Newcastle',to:'Man. City',pos:'MC',val:'€80M',liga:'UK',vpi:80,date:'Jan 2026'},
    {player:'Lamine Yamal',from:'Barcelona',to:'Barcelona',pos:'PD',val:'Renovação €10M/a',liga:'ESP',vpi:86,date:'Nov 2025'},
    {player:'Kane',from:'Bayern',to:'Bayern',pos:'CA',val:'Renovação €18M/a',liga:'GER',vpi:88,date:'Set 2025'},
    {player:'Pedro',from:'Flamengo',to:'Flamengo',pos:'CA',val:'Renovação R$1.2M/m',liga:'BRA',vpi:84,date:'Dez 2025'},
    {player:'Gabigol',from:'Flamengo',to:'Cruzeiro',pos:'CA',val:'€3M',liga:'BRA',vpi:70,date:'Jan 2026'},
    {player:'Bellingham',from:'Real Madrid',to:'Real Madrid',pos:'MC',val:'Renovação €20M/a',liga:'ESP',vpi:89,date:'Jan 2026'},
    {player:'Pulisic',from:'AC Milan',to:'AC Milan',pos:'PD',val:'Renovação €6M/a',liga:'ITA',vpi:78,date:'Out 2025'},
  ];

  // Odds de competições
  const ODDS = [
    {team:'FLA',comp:'Brasileirão 2026',odds:'2.8',mv:'+15%',liga:'BRA'},
    {team:'FLA',comp:'Libertadores 2026',odds:'4.5',mv:'+8%',liga:'BRA'},
    {team:'RM', comp:'La Liga 2025/26',  odds:'1.9',mv:'+3%',liga:'ESP'},
    {team:'RM', comp:'Champions League', odds:'3.2',mv:'+5%',liga:'EUR'},
    {team:'MCI',comp:'Premier League',   odds:'2.1',mv:'+7%',liga:'UK'},
    {team:'MCI',comp:'Champions League', odds:'4.0',mv:'+2%',liga:'EUR'},
    {team:'BAY',comp:'Bundesliga',       odds:'1.6',mv:'+4%',liga:'GER'},
    {team:'FCB',comp:'La Liga 2025/26',  odds:'3.5',mv:'-12%',liga:'ESP'},
    {team:'PSG',comp:'Ligue 1',          odds:'1.3',mv:'+1%',liga:'FRA'},
    {team:'ACM',comp:'Serie A',          odds:'5.0',mv:'+18%',liga:'ITA'},
    {team:'ALS',comp:'Saudi Pro League', odds:'2.2',mv:'+5%',liga:'SAU'},
  ];

  let currentLiga = null;

  window.filterLiga = function(liga) {
    currentLiga = liga;
    const tab = document.querySelector('#tcontent').dataset.tab || 'trans';
    showTab(tab);
  };

  window.showTab = function(tab, btn) {
    document.querySelectorAll('.tabs-row .tab-btn').forEach(b=>b.classList.remove('on'));
    if (btn) btn.classList.add('on');
    const el = document.getElementById('tcontent');
    el.dataset.tab = tab;
    el.innerHTML = renderTab(tab);
  };

  function renderTab(tab) {
    if (tab === 'trans') {
      let rows = TRANSFERS;
      if (currentLiga) rows = rows.filter(t=>t.liga.includes(currentLiga));
      return '<div class="sec">TRANSFERÊNCIAS · '+rows.length+' MOVIMENTOS · JAN 2026</div>'+
        '<table class="dt"><thead><tr>'+
        '<th>ATLETA</th><th>POS</th><th>DE</th><th></th><th>PARA</th><th>VALOR</th><th>VPI</th><th>DATA</th>'+
        '</tr></thead><tbody>'+
        rows.map(t=>{
          const isRen = t.from===t.to;
          const col   = isRen?'var(--c1)':'var(--g1)';
          return `<tr>
            <td style="font-weight:600;color:var(--t1)">${t.player}</td>
            <td><span class="trans-pos">${t.pos}</span></td>
            <td class="dim" style="font-size:8px">${t.from}</td>
            <td style="color:${col};font-size:10px">${isRen?'↺':'→'}</td>
            <td style="font-size:8.5px;color:${col};font-weight:600">${t.to}</td>
            <td class="${isRen?'c':'g'}" style="font-weight:700;font-family:var(--fm)">${t.val}</td>
            <td class="${t.vpi>=80?'g':t.vpi>=65?'a':'r'}">${t.vpi}%</td>
            <td class="dim" style="font-size:8px">${t.date}</td>
          </tr>`;
        }).join('')+'</tbody></table>';
    }

    if (tab === 'odds') {
      let rows = ODDS;
      if (currentLiga) rows = rows.filter(o=>o.liga===currentLiga||o.liga==='EUR');
      return '<div class="sec">ODDS APOSTAS · COMPETIÇÕES</div>'+
        '<table class="dt"><thead><tr>'+
        '<th>TIME</th><th>COMPETIÇÃO</th><th>ODDS TÍTULO</th><th>MV%</th><th>LIGA</th>'+
        '</tr></thead><tbody>'+
        rows.map(o=>{
          const t   = db[o.team];
          const mvN = parseFloat(o.mv);
          return `<tr onclick="SIT.go('${o.team}')" style="cursor:pointer">
            <td class="a" style="font-weight:700">${t?.tk||o.team}</td>
            <td>${o.comp}</td>
            <td class="g" style="font-weight:700;font-family:var(--fm)">${o.odds}x</td>
            <td class="${mvN>=0?'g':'r'}" style="font-weight:700">${o.mv}</td>
            <td class="dim" style="font-size:8px">${o.liga}</td>
          </tr>`;
        }).join('')+'</tbody></table>';
    }

    if (tab === 'valores') {
      const rows = Object.entries(db).sort((a,b)=>{
        const va=parseFloat(a[1].val?.replace(/[^0-9.]/g,'')||0);
        const vb=parseFloat(b[1].val?.replace(/[^0-9.]/g,'')||0);
        return vb-va;
      });
      return '<div class="sec">VALOR DE ELENCO POR CLUBE</div>'+
        '<table class="dt"><thead><tr>'+
        '<th>TIME</th><th>LIGA</th><th>VALOR ELENCO</th><th>RECEITA</th><th>EBITDA</th><th>ROE</th><th>VPI</th><th>ATLETAS</th>'+
        '</tr></thead><tbody>'+
        rows.map(([k,t])=>{
          const rc=t.rating==='BUY'?'buy':t.rating==='SELL'?'sell':'hold';
          return `<tr onclick="SIT.go('${k}')" style="cursor:pointer">
            <td><span class="a" style="font-weight:700;font-family:var(--fu)">${t.tk}</span> <span class="dim" style="font-size:8px">${t.n.slice(0,14)}</span></td>
            <td class="dim">${t.liga}</td>
            <td class="g" style="font-weight:700">${t.val}</td>
            <td class="dim">${t.rev}</td>
            <td class="dim">${t.ebitda}</td>
            <td class="${parseFloat(t.roe)>15?'g':'a'}">${t.roe}</td>
            <td class="${t.vpi>=75?'g':t.vpi>=60?'a':'r'}">${t.vpi}%</td>
            <td class="dim">${(t.athletes||[]).length}</td>
          </tr>`;
        }).join('')+'</tbody></table>';
    }

    if (tab === 'maestro') {
      const opL={lt:'<',gt:'>',eq:'='};
      return '<div class="sec">MAESTRO — ANALYST CALLS · CARDINAL RESEARCH</div>'+
        SIT_DB.MAESTRO.map(m=>{
          const rc=m.r==='BUY'?'buy':m.r==='SELL'?'sell':'hold';
          const t=db[m.tk.split('.')[0]];
          return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--b0);cursor:pointer"
            onclick="SIT.go('${m.tk.split('.')[0]}')">
            <span class="bg ${rc}">${m.r}</span>
            <span class="a" style="font-family:var(--fu);font-weight:700;width:64px">${m.tk}</span>
            <span style="font-size:9px;color:var(--t2);flex:1">${m.d}</span>
            <span class="bg ${rc}" style="margin-left:auto">${m.s}</span>
            <span class="dim" style="font-size:8px;width:48px;text-align:right">${m.date}</span>
          </div>`;
        }).join('')+
        '<div class="sec" style="margin-top:12px">ANR HISTÓRICO — DETALHADO</div>'+
        Object.entries(SIT_DB.ANR_HISTORY||{}).map(([k,anr])=>{
          const t=db[k];
          if(!t) return '';
          return `<div style="border:1px solid var(--b1);padding:8px;margin-bottom:6px;cursor:pointer" onclick="SIT.go('${k}')">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span class="a" style="font-family:var(--fu);font-weight:700;font-size:12px">${t.tk}</span>
              <span style="font-size:9px;color:var(--t2)">${t.n}</span>
              <span class="g" style="margin-left:auto;font-size:9px">↑ ${anr.buy} BUY</span>
              <span class="a" style="font-size:9px">= ${anr.hold} HOLD</span>
              <span class="r" style="font-size:9px">↓ ${anr.sell} SELL</span>
            </div>
            <div style="display:flex;gap:8px;font-size:8px;color:var(--t4);font-family:var(--fu)">
              <span>CONSENSUS: <b style="color:var(--g1)">${anr.consensus}</b></span>
              <span>PT LOW: ${anr.pt_low}</span>
              <span>PT MID: ${anr.pt_mid}</span>
              <span>PT HIGH: ${anr.pt_high}</span>
              <span>UPSIDE: <b class="${anr.upside.startsWith('+')?'g':'r'}">${anr.upside}</b></span>
            </div>
          </div>`;
        }).join('');
    }
    if (tab==='news') {
      const tc=document.getElementById('tcontent');
      NEWS.buscarTime('transferência futebol mercado','BRA').then(s=>{
        tc.innerHTML='<div style="padding:8px 12px" class="fadein">'+NEWS.renderPainel(s,'NEWS · MERCADO DE TRANSFERÊNCIAS')+'</div>';
      });
      return '<div class="dim" style="padding:12px">Buscando notícias de mercado...</div>';
    }
    return '';
  }

  showTab('trans');
}
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").then(()=>console.log("[PWA] SW registrado")).catch(e=>console.warn("[PWA]",e));}</script>
</body>
</html>
