<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00ff41">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/icon.svg">
<meta charset="UTF-8"><title>SIT · ALERTS PANEL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sit-shell.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg0);color:var(--t1);font-family:var(--fm);overflow:hidden;height:100vh;display:flex;flex-direction:column}
.panel-header{height:26px;background:#000;border-bottom:1px solid var(--b3);display:flex;align-items:center;gap:6px;padding:0 8px;flex-shrink:0;cursor:move}
.ph-title{font-size:8px;font-weight:700;color:var(--t4);font-family:var(--fu);letter-spacing:1px;flex:1}
.ph-close{background:transparent;border:none;color:var(--t4);cursor:pointer;font-size:10px}
.ph-close:hover{color:var(--r1)}
.alert-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-bottom:1px solid var(--b0);font-size:9px}
.alert-fired{background:rgba(255,51,51,.06);border-left:2px solid var(--r2)}
.alert-ok{border-left:2px solid transparent}
.status-bar{height:18px;background:#000;border-top:1px solid var(--b1);display:flex;align-items:center;padding:0 8px;flex-shrink:0;gap:8px}
.sb-txt{font-size:7px;color:var(--t5);font-family:var(--fu)}
.empty{text-align:center;padding:24px;color:var(--t5);font-family:var(--fu);font-size:9px}
</style>
</head>
<body>
<div class="panel-header">
  <span style="font-size:10px">⚡</span>
  <span class="ph-title">ALERTAS ATIVOS</span>
  <span id="ph-count" style="font-size:7px;color:var(--r1);font-family:var(--fu)"></span>
  <button class="ph-close" onclick="window.close()">✕</button>
</div>
<div style="flex:1;overflow-y:auto" id="alerts-list"></div>
<div class="status-bar">
  <span class="sb-txt">MONITOR AUTOMÁTICO · 5MIN</span>
  <span class="sb-txt" id="sb-time"></span>
  <span class="sb-txt" style="margin-left:auto">ALERTS · PAINEL</span>
</div>
<script src="sit-db.js"></script>
<script src="sit-indicators.js"></script>
<script>
function getAlerts(){
  try{return JSON.parse(localStorage.getItem('sit_alerts')||'[]');}catch(e){return[];}
}
function render(){
  const alerts=getAlerts();
  const el=document.getElementById('alerts-list');
  const opL={lt:'<',gt:'>',eq:'='};
  if(!alerts.length){
    el.innerHTML='<div class="empty">⚡ Nenhum alerta.<br><span style="font-size:8px">Configure em alert.html</span></div>';
    document.getElementById('ph-count').textContent='';
    return;
  }
  const db=SIT_DB.DB;
  let fired=0;
  const rows=alerts.map(al=>{
    const t=db[al.team];
    if(!t) return '';
    const ind=IND.calcAll(t);
    const cur={vpi:ind.vpi,pbi:ind.pbi,rsi:ind.rsi,quant:ind.quant.score}[al.ind]||0;
    const val=Math.round(cur*10)/10;
    const trig=(al.op==='lt'&&val<al.val)||(al.op==='gt'&&val>al.val)||(al.op==='eq'&&Math.abs(val-al.val)<0.5);
    if(trig) fired++;
    const col=trig?'var(--r1)':'var(--g3)';
    const cls=trig?'alert-fired':'alert-ok';
    return `<div class="alert-item ${cls}">
      <span style="font-size:9px">${trig?'⚡':'●'}</span>
      <span class="a" style="font-family:var(--fu);font-weight:700;width:36px">${t.tk.split('.')[0]}</span>
      <span style="color:var(--t3);font-family:var(--fu);font-size:8px">${al.ind.toUpperCase()} ${opL[al.op]} ${al.val}</span>
      <span style="flex:1;text-align:right;font-family:var(--fm);font-weight:700;color:${col}">${val}</span>
    </div>`;
  }).join('');
  el.innerHTML=rows;
  document.getElementById('ph-count').textContent=fired?`${fired} DISPARADO${fired>1?'S':''}!`:'';
}
setInterval(()=>{document.getElementById('sb-time').textContent=new Date().toLocaleTimeString('pt-BR');},1000);
setInterval(render,60000);
render();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").then(()=>console.log("[PWA] SW registrado")).catch(e=>console.warn("[PWA]",e));}</script>
</body>
</html>
