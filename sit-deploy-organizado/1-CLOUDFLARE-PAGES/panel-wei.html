<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00ff41">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/icon.svg">
<meta charset="UTF-8"><title>SIT · WEI</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sit-shell.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg0);color:var(--t1);font-family:var(--fm);overflow:hidden;height:100vh;display:flex;flex-direction:column}
.panel-header{height:26px;background:#000;border-bottom:1px solid var(--b3);display:flex;align-items:center;gap:6px;padding:0 8px;flex-shrink:0;cursor:move}
.ph-title{font-size:8px;font-weight:700;color:var(--t4);font-family:var(--fu);letter-spacing:1px;flex:1}
.ph-close{background:transparent;border:none;color:var(--t4);cursor:pointer;font-size:10px;padding:0 2px}
.ph-close:hover{color:var(--r1)}
.panel-body{flex:1;overflow-y:auto;padding:6px 8px}
.wei-row{display:flex;align-items:center;gap:5px;padding:5px 0;border-bottom:1px solid var(--b0);font-size:9px;cursor:pointer;transition:background .1s}
.wei-row:hover{background:rgba(0,255,65,.03)}
.wei-flag{font-size:14px;width:22px;text-align:center;flex-shrink:0}
.wei-name{flex:1;font-family:var(--fu);font-size:9px;color:var(--t2)}
.wei-spark{width:50px;flex-shrink:0}
.wei-bar-wrap{width:60px;flex-shrink:0}
.wei-bar{height:3px;background:var(--bg2);border-radius:2px}
.wei-fill{height:100%;border-radius:2px;transition:width .5s}
.wei-val{width:34px;text-align:right;font-family:var(--fm);font-size:10px;font-weight:700;flex-shrink:0}
.wei-chg{width:36px;text-align:right;font-family:var(--fm);font-size:8px;flex-shrink:0}
.status-bar{height:18px;background:#000;border-top:1px solid var(--b1);display:flex;align-items:center;padding:0 8px;flex-shrink:0;gap:8px}
.sb-txt{font-size:7px;color:var(--t5);font-family:var(--fu)}
</style>
</head>
<body>
<div class="panel-header">
  <div class="pulse-dot"></div>
  <span class="ph-title">WEI — WORLD FOOTBALL INDEX</span>
  <button class="ph-close" onclick="window.close()" title="Fechar">✕</button>
</div>
<div class="panel-body" id="wei-list"></div>
<div class="status-bar">
  <span class="sb-txt">VPI POR REGIÃO</span>
  <span class="sb-txt" id="sb-time"></span>
  <span class="sb-txt" style="margin-left:auto">WEI · PAINEL DESTACADO</span>
</div>
<script src="sit-db.js"></script>
<script>
const WEI=[
  {f:'🌍',n:'Global',    v:74.2,c:+0.8},{f:'🇧🇷',n:'Brasil',   v:78.1,c:+2.1},
  {f:'🇪🇸',n:'Espanha',  v:82.3,c:+3.2},{f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',n:'Inglaterra',v:80.5,c:+1.4},
  {f:'🇩🇪',n:'Alemanha', v:76.2,c:+1.7},{f:'🇮🇹',n:'Itália',   v:72.8,c:-0.9},
  {f:'🇫🇷',n:'França',   v:74.5,c:+0.3},{f:'🇸🇦',n:'Arábia',   v:71.0,c:+1.6},
  {f:'🇵🇹',n:'Portugal', v:73.2,c:+0.5},{f:'🇳🇱',n:'Holanda',  v:70.8,c:-0.4},
  {f:'🇺🇸',n:'EUA',      v:68.5,c:+3.8},{f:'🇲🇽',n:'México',   v:66.2,c:+1.2},
];

function miniSpark(vals, col){
  const w=50,h=14,pad=2;
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const pts=vals.map((v,i)=>{
    const x=pad+(i/(vals.length-1))*(w-pad*2);
    const y=h-pad-(v-mn)/rng*(h-pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.2" opacity=".8"/>
    <circle cx="${pts.split(' ').pop().split(',')[0]}" cy="${pts.split(' ').pop().split(',')[1]}" r="2" fill="${col}"/>
  </svg>`;
}

function render(){
  document.getElementById('wei-list').innerHTML=WEI.map(w=>{
    const up=w.c>=0;
    const col=up?'var(--g1)':'var(--r1)';
    const spark=miniSpark([w.v-3,w.v-1.5,w.v+0.5,w.v-0.8,w.v],up?'#00ff41':'#ff3333');
    return `<div class="wei-row">
      <span class="wei-flag">${w.f}</span>
      <span class="wei-name">${w.n}</span>
      <span class="wei-spark">${spark}</span>
      <div class="wei-bar-wrap">
        <div class="wei-bar"><div class="wei-fill" style="width:${w.v}%;background:${col}"></div></div>
      </div>
      <span class="wei-val" style="color:${col}">${w.v}%</span>
      <span class="wei-chg" style="color:${col}">${up?'+':''}${w.c}%</span>
    </div>`;
  }).join('');
}
setInterval(()=>{document.getElementById('sb-time').textContent=new Date().toLocaleTimeString('pt-BR');},1000);
render();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").then(()=>console.log("[PWA] SW registrado")).catch(e=>console.warn("[PWA]",e));}</script>
</body>
</html>
