<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SIT · TEAM</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sit-shell.css">
<style>
.team-hd{background:var(--bg0);padding:6px 12px;border-bottom:1px solid var(--b3);display:flex;align-items:center;gap:8px;flex-shrink:0}
.th-tk{font-size:18px;font-weight:700;color:var(--a1);font-family:var(--fu);letter-spacing:1px;min-width:52px}
.th-name{font-size:11px;color:var(--t1);font-family:var(--fu)}
.th-right{margin-left:auto;display:flex;gap:4px;align-items:center}
.th-btn{padding:2px 8px;font-size:7.5px;border:1px solid var(--b2);background:transparent;cursor:pointer;font-family:var(--fu);font-weight:700;letter-spacing:.5px;transition:all .1s}
.th-btn:hover{border-color:var(--g2);color:var(--g1)}
.th-btn.green{color:var(--g2)}.th-btn.amber{color:var(--a1)}.th-btn.purple{color:var(--p1)}

/* KPI strip abaixo do header */
.kpi-strip{display:flex;background:var(--bg1);border-bottom:1px solid var(--b1);flex-shrink:0;overflow-x:auto}
.kpi-cell{padding:4px 12px;border-right:1px solid var(--b1);flex-shrink:0;min-width:80px}
.kpi-lbl{font-size:6.5px;color:var(--t5);font-family:var(--fu);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.kpi-val{font-size:13px;font-weight:700;font-family:var(--fu);line-height:1.2;margin-top:1px}
.kpi-sub{font-size:7px;color:var(--t4);font-family:var(--fu)}

/* Tab content */
.tcontent{flex:1;overflow-y:auto;padding:8px 12px}
.tcontent::-webkit-scrollbar{width:3px}

/* Ind cards */
.ind-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.ind-card{background:var(--bg0);border:1px solid var(--b1);padding:8px 10px;cursor:default;transition:border-color .1s}
.ind-card:hover{border-color:var(--b3)}
.ind-card .lbl{font-size:6.5px;color:var(--t5);font-family:var(--fu);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.ind-card .val{font-size:20px;font-weight:700;font-family:var(--fu);line-height:1}
.ind-card .sub{font-size:7.5px;color:var(--t3);font-family:var(--fu);margin-top:2px}
.ind-card .bar{height:2px;background:var(--bg1);margin-top:5px;border-radius:1px}
.ind-card .bar-fill{height:100%;border-radius:1px;transition:width .6s .1s}

/* Gauge ring */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:12px 8px}
.gauge-lbl{font-size:7px;color:var(--t4);font-family:var(--fu);letter-spacing:1px;text-align:center;margin-top:6px;text-transform:uppercase}

/* Factor table */
.ft{width:100%;border-collapse:collapse;font-size:9px}
.ft td{padding:4px 6px;border-bottom:1px solid var(--b0)}
.ft td:first-child{color:var(--t4);font-family:var(--fu);font-size:7.5px;text-transform:uppercase;letter-spacing:.5px;width:140px}
.ft td:nth-child(2){color:var(--t1);font-family:var(--fm);font-weight:700}
.ft td:last-child{text-align:right}

/* Prob bar */
.prob-bar{display:flex;height:18px;border-radius:1px;overflow:hidden;margin:6px 0}
.prob-up{background:rgba(0,255,65,.3)}
.prob-flat{background:rgba(255,179,0,.3)}
.prob-dn{background:rgba(255,51,51,.3)}
.prob-lbl{font-size:8px;font-family:var(--fu);font-weight:700;line-height:18px;padding:0 6px;white-space:nowrap}
</style>
</head>
<body class="sit-layout">
<div id="header"></div>
<div class="sit-body">

  <!-- NAV -->
  <div class="nav-lateral">
    <div class="nav-section">
      <div class="nav-sec-hd">Funções</div>
      <div class="nav-item" onclick="SIT.go('MON')"><span class="t3">◉</span><span>MONITOR</span></div>
      <div class="nav-item" onclick="SIT.go('COPA')"><span style="font-size:9px">🏆</span><span>COPA 2026</span></div>
      <div class="nav-item" onclick="SIT.go('H2H')"><span class="t3">⇄</span><span>H2H</span></div>
      <div class="nav-item" onclick="SIT.go('MRKT')"><span class="t3">↔</span><span>MERCADO</span></div>
    </div>
    <div class="nav-section"><div class="nav-sec-hd">Times</div><div id="nav-teams"></div></div>
  </div>

  <!-- CONTENT -->
  <div class="sit-content">
    <!-- Header do time -->
    <div class="team-hd">
      <span class="th-tk" id="th-tk">—</span>
      <div>
        <div class="th-name" id="th-name">—</div>
        <div style="font-size:8px;color:var(--t4);font-family:var(--fu)" id="th-meta">—</div>
      </div>
      <span class="bg" id="th-rating" style="margin-left:6px">—</span>
      <span id="th-chg" style="font-size:10px;margin-left:4px">—</span>
      <div class="th-right">
        <button class="th-btn green" onclick="window.history.back()">← BACK</button>
        <button class="th-btn amber" id="btn-fav" onclick="addFav()">★ FAVE</button>
        <button class="th-btn" onclick="SIT.go('H2H')" style="color:var(--c1)">⇄ H2H</button>
        <button class="th-btn purple" onclick="loadTab('SIT-QUANT')">◆ QUANT</button>
      </div>
    </div>

    <!-- KPI strip com indicadores calculados -->
    <div class="kpi-strip" id="kpi-strip">
      <div class="kpi-cell"><div class="kpi-lbl">VPI</div><div class="kpi-val g" id="ks-vpi">—</div><div class="kpi-sub">calculado</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">PBI</div><div class="kpi-val" id="ks-pbi">—</div><div class="kpi-sub">queima</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">RSI(14)</div><div class="kpi-val" id="ks-rsi">—</div><div class="kpi-sub">momentum</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">TDM</div><div class="kpi-val a" id="ks-tdm">—</div><div class="kpi-sub">domínio</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">GRAHAM</div><div class="kpi-val" id="ks-gr">—</div><div class="kpi-sub">VI</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">BUFFETT</div><div class="kpi-val" id="ks-buf">—</div><div class="kpi-sub">moat</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">BLACKROCK</div><div class="kpi-val" id="ks-blk">—</div><div class="kpi-sub">risco</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">NASH</div><div class="kpi-val" id="ks-nash">—</div><div class="kpi-sub">equilíbrio</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">JUNG</div><div class="kpi-val p" id="ks-jung">—</div><div class="kpi-sub">arquétipo</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">FEYNMANN</div><div class="kpi-val" id="ks-feyn">—</div><div class="kpi-sub">eficiência</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">SCHRÖDINGER</div><div class="kpi-val" id="ks-schr">—</div><div class="kpi-sub">P(UP)</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">SIT-QUANT</div><div class="kpi-val g" id="ks-sq">—</div><div class="kpi-sub">composite</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs-row" id="tabs"></div>
    <div class="tcontent fadein" id="tcontent"></div>
  </div>
</div>
<div id="statusbar"></div>

<script src="sit-db.js"></script>
<script src="sit-core.js"></script>
<script src="sit-indicators.js"></script>
<script src="sit-supabase.js"></script>
<script>
const params  = new URLSearchParams(window.location.search);
const teamKey = (params.get('team') || 'FLA').toUpperCase();
const initTab = (params.get('tab')  || 'DES').toUpperCase();
const session = SIT.boot('TEAM', '<div class="sb-item">TEAM <b id="sb-team">—</b></div>');

if (session) {
  const db  = SIT_DB.DB;
  const t   = db[teamKey];

  if (!t) {
    document.getElementById('tcontent').innerHTML =
      '<div class="ind-card" style="margin-top:16px">Time <span class="a">'+teamKey+'</span> não encontrado. '+
      '<span class="lk" onclick="SIT.go(\'MON\')">← MON</span></div>';
  } else {
    document.title = 'SIT · ' + t.tk + ' — ' + t.n;
    const s = SIT.getSession(); s.lastTeam = teamKey; SIT.setSession(s);

    // ── Header ──────────────────────────────────────────
    const rc = t.rating==='BUY'?'buy':t.rating==='SELL'?'sell':'hold';
    document.getElementById('th-tk').textContent   = t.tk;
    document.getElementById('th-name').textContent = t.n;
    document.getElementById('th-meta').textContent =
      t.liga + ' · ' + t.stadium + ' · ' + t.coach;
    document.getElementById('th-rating').className = 'bg '+rc;
    document.getElementById('th-rating').textContent = t.rating + ' ' + t.score;
    const chgEl = document.getElementById('th-chg');
    chgEl.className = t.chgN > 0 ? 'g' : 'r';
    chgEl.textContent = t.chg;
    document.getElementById('sb-team').textContent = t.tk;
    if (SIT.isFave('teams', teamKey))
      document.getElementById('btn-fav').textContent = '★ SAVED';
    SIT.setBreadcrumb([
      {label:'MON', href:'MON'},{label:t.liga},{label:t.tk}
    ]);

    // ── Nav times ────────────────────────────────────────
    document.getElementById('nav-teams').innerHTML =
      Object.entries(db).map(([k,tm]) => {
        const act = k===teamKey?' active':'';
        const col = tm.chgN>0?'tup':'tdn';
        return '<div class="nav-item'+act+'" onclick="SIT.go(\''+k+'\')">' +
          '<span class="'+(tm.rating==='BUY'?'g':tm.rating==='SELL'?'r':'a')+
          '" style="font-size:7px">●</span>' +
          '<span style="flex:1">'+tm.tk+'</span>' +
          '<span class="nav-item-val '+col+'">'+tm.vpi+'%</span></div>';
      }).join('');

    // ── Calcular todos os 13 indicadores ─────────────────
    const anrData = SIT_DB.ANR_HISTORY?.[teamKey] || null;
    const ind = IND.calcAll(t, anrData);

    // Preencher KPI strip
    const rsiLbl = IND.RSI.label(ind.rsi);
    const blkCol = ind.blackrock.color;
    document.getElementById('ks-vpi').textContent  = ind.vpi + '%';
    document.getElementById('ks-vpi').className    = 'kpi-val ' + (ind.vpi>=75?'g':ind.vpi>=60?'a':'r');
    document.getElementById('ks-pbi').textContent  = ind.pbi + '%';
    document.getElementById('ks-pbi').className    = 'kpi-val ' + (ind.pbi<20?'g':ind.pbi<30?'a':'r');
    document.getElementById('ks-rsi').textContent  = ind.rsi;
    document.getElementById('ks-rsi').style.color  = rsiLbl.col;
    document.getElementById('ks-tdm').textContent  = ind.tdm;
    document.getElementById('ks-tdm').style.color  = IND.TDM.color(ind.tdm);
    document.getElementById('ks-gr').textContent   = ind.graham.vi.toFixed(1);
    document.getElementById('ks-gr').className     = 'kpi-val ' + (ind.graham.margin>30?'g':ind.graham.margin>10?'a':'r');
    document.getElementById('ks-buf').textContent  = ind.buffett.score.toFixed(1);
    document.getElementById('ks-buf').className    = 'kpi-val ' + (ind.buffett.score>75?'g':ind.buffett.score>55?'a':'r');
    document.getElementById('ks-blk').textContent  = ind.blackrock.label;
    document.getElementById('ks-blk').style.color  = blkCol;
    document.getElementById('ks-nash').textContent = ind.nash.score.toFixed(1);
    document.getElementById('ks-nash').className   = 'kpi-val ' + (ind.nash.score>75?'g':ind.nash.score>55?'a':'r');
    document.getElementById('ks-jung').textContent = ind.jung.tipo;
    document.getElementById('ks-feyn').textContent = ind.feynmann.score.toFixed(1);
    document.getElementById('ks-feyn').className   = 'kpi-val ' + (ind.feynmann.score>75?'g':ind.feynmann.score>55?'a':'r');
    document.getElementById('ks-schr').textContent = ind.schro.pUp + '%';
    document.getElementById('ks-schr').className   = 'kpi-val ' + (ind.schro.pUp>55?'g':ind.schro.pUp<35?'r':'a');
    document.getElementById('ks-sq').textContent   = ind.quant.score.toFixed(1);
    document.getElementById('ks-sq').className     = 'kpi-val ' + (ind.quant.score>=80?'g':ind.quant.score>=65?'a':'r');

    // ── Tabs ─────────────────────────────────────────────
    const TABS = [
      {k:'DES',   lbl:'DES'},
      {k:'VPI',   lbl:'VPI'},
      {k:'RSI',   lbl:'RSI'},
      {k:'TDM',   lbl:'TDM'},
      {k:'GRAHAM',lbl:'GRAHAM'},
      {k:'BUFFETT',lbl:'BUFFETT', dm:true},
      {k:'BLACKROCK',lbl:'BLACKROCK', dm:true},
      {k:'NASH',  lbl:'NASH', dm:true},
      {k:'JUNG',  lbl:'JUNG', dm:true},
      {k:'FEYNMANN',lbl:'FEYNMANN', dm:true},
      {k:'SIT-QUANT',lbl:'SIT-QUANT', dm:true},
      {k:'HP',    lbl:'HP'},
      {k:'HOLD',  lbl:'HOLD'},
      {k:'RIGHTS',lbl:'RIGHTS'},
      {k:'ELENCO',lbl:'ELENCO'},
    ];
    document.getElementById('tabs').innerHTML = TABS.map(tab =>
      '<button class="tab-btn'+(tab.k===initTab?' on':'')+(tab.dm?' diamond':'')+
      '" onclick="loadTab(\''+tab.k+'\',this)">'+tab.lbl+'</button>'
    ).join('');

    window.loadTab = function(tab, btn) {
      history.replaceState(null,'','team.html?team='+teamKey+'&tab='+tab);
      document.querySelectorAll('#tabs .tab-btn').forEach(b=>b.classList.remove('on'));
      if (btn) btn.classList.add('on');
      else document.querySelector('[onclick*="\''+tab+'\'"]')?.classList.add('on');
      const el = document.getElementById('tcontent');
      el.className = 'tcontent fadein';
      el.innerHTML = renderTab(tab);
    };
    loadTab(initTab);
  }

  function addFav() {
    SIT.addFave('teams', teamKey);
    document.getElementById('btn-fav').textContent = '★ SAVED';
  }

  // ── RENDER TABS ────────────────────────────────────────
  function renderTab(tab) {
    const t   = SIT_DB.DB[teamKey]; if (!t) return '';
    const ind = IND.calcAll(t, SIT_DB.ANR_HISTORY?.[teamKey]);
    const athl = t.athletes || [];

    // ── DES ─────────────────────────────────────────────
    if (tab === 'DES') {
      return indGrid([
        {lbl:'VPI',      val:ind.vpi+'%',       sub:'Value Performance',    col:ind.vpi>=75?'var(--g1)':ind.vpi>=60?'var(--a1)':'var(--r1)', pct:ind.vpi},
        {lbl:'PBI',      val:ind.pbi+'%',       sub:'Performance Burn',     col:ind.pbi<20?'var(--g1)':ind.pbi<30?'var(--a1)':'var(--r1)', pct:ind.pbi},
        {lbl:'RSI(14)',  val:ind.rsi,           sub:IND.RSI.label(ind.rsi).txt, col:IND.RSI.label(ind.rsi).col, pct:ind.rsi},
        {lbl:'TDM',      val:ind.tdm,           sub:'Domínio de mercado',   col:IND.TDM.color(ind.tdm), pct:{GOLDEN:100,ACTIVE:80,RISING:65,STABLE:50,'N/A':20}[ind.tdm]},
      ]) +
      '<div class="sec">IDENTITY & FUNDAMENTALS</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
        kvCard(t) + statsCard(t) +
      '</div>' +
      '<div class="sec" style="margin-top:8px">ELENCO — CLIQUE PARA DOSSIÊ</div>' +
      squadTable(athl, teamKey);
    }

    // ── VPI ─────────────────────────────────────────────
    if (tab === 'VPI') {
      const vpiCalc = IND.VPI._calcTeam(t);
      const comp    = t.hp || [];
      return '<div class="sec">VPI — VALUE PERFORMANCE INDEX · FÓRMULA CARDINAL</div>' +
        '<div style="display:grid;grid-template-columns:200px 1fr;gap:12px;margin-bottom:10px">' +
          gaugeRing(ind.vpi, 'var(--g1)', 'VPI · '+ind.vpi+'%') +
          '<div>' +
            '<div class="sec" style="margin-top:0">DECOMPOSIÇÃO</div>' +
            '<table class="ft">' +
              '<tr><td>OFF (Ofensivo) × 0.40</td><td class="g">'  +calcOff(t)+'</td><td class="dim">gols+ass/90min</td></tr>'+
              '<tr><td>DEF (Defensivo) × 0.25</td><td class="a">' +calcDef(t)+'</td><td class="dim">1-PBI×1.8</td></tr>'+
              '<tr><td>DISP (Disponibilidade) × 0.20</td><td>'    +calcDisp(t)+'</td><td class="dim">min/3060</td></tr>'+
              '<tr><td>IMP (Impacto) × 0.15</td><td class="c">'   +calcImp(t)+'</td><td class="dim">win%×100</td></tr>'+
              '<tr style="border-top:1px solid var(--b2)"><td><b>VPI CALCULADO</b></td><td class="g" style="font-size:14px;font-weight:700">'+vpiCalc+'%</td><td class="dim">Cardinal Protocol</td></tr>'+
              '<tr><td>VPI DB (referência)</td><td class="a">'+t.vpi+'%</td><td class="dim">Dataset</td></tr>'+
            '</table>' +
          '</div>' +
        '</div>' +
        '<div class="sec">VPI POR ATLETA</div>' +
        '<table class="dt"><thead><tr><th>ATLETA</th><th>POS</th><th>VPI CALC</th><th>VPI DB</th><th>DELTA</th><th>OFF</th><th>PBI</th></tr></thead><tbody>' +
        athl.sort((a,b)=>b.vpi-a.vpi).map(a => {
          const vc = IND.VPI._calcAthlete(a);
          const d  = (vc - a.vpi).toFixed(1);
          const url= 'athlete.html?team='+teamKey+'&athlete='+encodeURIComponent(a.n);
          return '<tr><td class="lk" onclick="window.location.href=\''+url+'\'" style="cursor:pointer">'+a.n+'</td>'+
            '<td class="dim">'+a.pos+'</td>'+
            '<td class="'+(vc>=80?'g':vc>=65?'a':'r')+'" style="font-weight:700">'+vc+'%</td>'+
            '<td class="dim">'+a.vpi+'%</td>'+
            '<td class="'+(d>0?'g':d<0?'r':'dim')+'">'+(d>0?'+':'')+d+'</td>'+
            '<td class="a">'+((a.gols*2+a.ass)/Math.max(a.min/90,1)).toFixed(2)+'/90</td>'+
            '<td class="'+(a.pbi<20?'g':a.pbi<30?'a':'r')+'">'+a.pbi+'%</td></tr>';
        }).join('') +
        '</tbody></table>';
    }

    // ── RSI ─────────────────────────────────────────────
    if (tab === 'RSI') {
      const lbl  = IND.RSI.label(ind.rsi);
      const serie = (t.hp||[]).map(h=>h.vp).reverse();
      serie.push(t.vpi);
      return '<div class="sec">RSI(14) — RELATIVE STRENGTH INDEX · WILDER</div>' +
        '<div style="display:grid;grid-template-columns:200px 1fr;gap:12px;margin-bottom:10px">' +
          gaugeRing(ind.rsi, lbl.col, 'RSI · '+ind.rsi) +
          '<div>' +
            formulaBox('RSI(14) = 100 − 100 / (1 + RS)\nRS = AvgGain(14) / AvgLoss(14)') +
            '<table class="ft" style="margin-top:8px">' +
              '<tr><td>RSI atual</td><td style="color:'+lbl.col+';font-weight:700;font-size:14px">'+ind.rsi+'</td><td style="color:'+lbl.col+'">'+lbl.txt+'</td></tr>'+
              '<tr><td>Sinal</td><td class="'+(ind.rsi>70?'r':ind.rsi<30?'g':'a')+'">'+
                (ind.rsi>70?'RISK — possível reversão':ind.rsi<30?'OPORTUNIDADE — sobrevendido':'NEUTRO — sem sinal')+'</td><td></td></tr>'+
              '<tr><td>Períodos calculados</td><td class="dim">'+serie.length+' partidas</td><td></td></tr>'+
            '</table>' +
          '</div>' +
        '</div>' +
        '<div class="sec">SÉRIE VPI — '+serie.length+' PONTOS</div>' +
        sparkFull(serie, 'var(--g1)') +
        '<div class="sec" style="margin-top:8px">VPI POR PARTIDA</div>' +
        '<table class="dt"><thead><tr><th>DATA</th><th>ADVERSÁRIO</th><th>PLACAR</th><th>VPI</th><th>RSI PARCIAL</th></tr></thead><tbody>' +
        (t.hp||[]).map((h,i,arr) => {
          const serieParcial = arr.slice(i).map(x=>x.vp).reverse();
          serieParcial.push(h.vp);
          const rsiParcial = IND.RSI.calc(serieParcial);
          const lp = IND.RSI.label(rsiParcial);
          return '<tr><td class="dim">'+h.d+'</td><td>'+h.adv+'</td>'+
            '<td class="a" style="font-weight:700">'+h.pl+'</td>'+
            '<td class="'+(h.vp>=80?'g':h.vp>=65?'a':'r')+'">'+h.vp+'%</td>'+
            '<td style="color:'+lp.col+'">'+rsiParcial+' · '+lp.txt+'</td></tr>';
        }).join('') +
        '</tbody></table>';
    }

    // ── TDM ─────────────────────────────────────────────
    if (tab === 'TDM') {
      return '<div class="sec">TDM — TRANSFERÊNCIA DE DOMÍNIO DE MERCADO</div>' +
        indGrid([
          {lbl:'TDM STATUS', val:ind.tdm, sub:'Calculado', col:IND.TDM.color(ind.tdm), pct:{GOLDEN:100,ACTIVE:80,RISING:65,STABLE:50,'N/A':20}[ind.tdm]},
          {lbl:'WIN%', val:calcWinPct(t)+'%', sub:'Últimas '+((t.hp||[]).length)+' partidas', col:'var(--g1)', pct:calcWinPct(t)},
          {lbl:'VPI TREND', val:calcTrend(t), sub:'Direção', col:'var(--g2)', pct:60},
          {lbl:'RATING', val:t.rating, sub:t.score, col:t.rating==='BUY'?'var(--g1)':t.rating==='SELL'?'var(--r1)':'var(--a1)', pct:t.rating==='BUY'?90:t.rating==='HOLD'?60:30},
        ]) +
        formulaBox('GOLDEN  → VPI>80 + BUY + Win%>65%\nACTIVE  → VPI>75 + BUY + Win%>55%\nRISING  → VPI crescente 3+ jogos + HOLD\nSTABLE  → VPI±3% + HOLD\nN/A     → VPI<60 ou SELL') +
        '<div class="sec" style="margin-top:8px">HISTÓRICO DE PARTIDAS</div>' +
        '<table class="dt"><thead><tr><th>DATA</th><th>ADVERSÁRIO</th><th>PLACAR</th><th>VPI</th><th>VAR%</th></tr></thead><tbody>' +
        (t.hp||[]).map(h => '<tr><td class="dim">'+h.d+'</td><td>'+h.adv+'</td>'+
          '<td class="a" style="font-weight:700">'+h.pl+'</td>'+
          '<td class="'+(h.vp>=80?'g':h.vp>=65?'a':'r')+'">'+h.vp+'%</td>'+
          '<td class="'+(h.var.startsWith('+')?'g':'r')+'">'+h.var+'</td></tr>').join('') +
        '</tbody></table>';
    }

    // ── GRAHAM ───────────────────────────────────────────
    if (tab === 'GRAHAM') {
      const g = ind.graham;
      const marginCol = g.margin>30?'var(--g1)':g.margin>10?'var(--a1)':'var(--r1)';
      return '<div class="sec">GRAHAM — VALOR INTRÍNSECO · BEN GRAHAM ADAPTADO</div>' +
        indGrid([
          {lbl:'VALOR INTRÍNSECO', val:g.vi.toFixed(1), sub:'VPI score', col:marginCol, pct:g.vi},
          {lbl:'MARGEM SEGURANÇA', val:g.margin.toFixed(1)+'%', sub:g.margin>30?'COMPRA SEGURA':'Monitorar', col:marginCol, pct:Math.abs(g.margin)},
          {lbl:'RATING GRAHAM', val:g.rating, sub:'BUY>30% HOLD>10%', col:g.rating==='BUY'?'var(--g1)':g.rating==='HOLD'?'var(--a1)':'var(--r1)', pct:g.margin>30?90:60},
          {lbl:'TAXA CRESCIMENTO G', val:g.G.toFixed(2)+'×', sub:'VPI trend estimado', col:'var(--c1)', pct:g.G*20},
        ]) +
        formulaBox('VI = EPS × (8.5 + 2×G) × (4.4/Y)\nEPS = EBITDA/ValorElenco\nG   = VPI_trend × 2\nY   = SELIC (13.75%)') +
        '<div class="sec" style="margin-top:8px">CHECKLIST GRAHAM</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">' +
        g.checklist.map(c =>
          '<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border:1px solid var(--b1);background:var(--bg0)">' +
          '<span style="color:'+(c.pass?'var(--g1)':'var(--r1)')+'">'+( c.pass ? '✓' : '✗' )+'</span>' +
          '<span style="font-size:9px;color:var(--t2)">'+c.item+'</span></div>'
        ).join('') +
        '</div>';
    }

    // ── BUFFETT ──────────────────────────────────────────
    if (tab === 'BUFFETT') {
      const b = ind.buffett;
      return '<div class="sec">BUFFETT — QUALIDADE DE FRANQUIA · MOAT ANALYSIS</div>' +
        indGrid([
          {lbl:'MOAT SCORE',   val:b.score.toFixed(1), sub:b.label, col:b.score>75?'var(--g1)':b.score>55?'var(--a1)':'var(--r1)', pct:b.score},
          {lbl:'MARCA',        val:b.marca,             sub:'Reach × torcida',  col:'var(--c1)', pct:b.marca},
          {lbl:'RECEITA/ROE',  val:b.receita,           sub:'Retorno capital',   col:'var(--g2)', pct:b.receita},
          {lbl:'FIDELIDADE',   val:b.fidelidade,        sub:'Win% proxy',        col:'var(--a1)', pct:b.fidelidade},
        ]) +
        formulaBox('MOAT = 0.25×MARCA + 0.25×RECEITA\n     + 0.20×FIDELIDADE + 0.20×INFRA + 0.10×GESTÃO') +
        '<div class="sec" style="margin-top:8px">BREAKDOWN DOS COMPONENTES</div>' +
        ['marca','receita','fidelidade','infra','gestao'].map(k => {
          const v = b[k] || 0;
          return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--b0)">' +
            '<span style="width:100px;font-size:8px;font-family:var(--fu);color:var(--t4);text-transform:uppercase">'+k+'</span>' +
            '<div style="flex:1;height:4px;background:var(--bg0);border-radius:2px">'+
            '<div style="width:'+v+'%;height:100%;background:'+(v>75?'var(--g1)':v>55?'var(--a1)':'var(--r1)')+';border-radius:2px"></div></div>' +
            '<span style="width:32px;text-align:right;font-family:var(--fm);font-size:9px;color:'+(v>75?'var(--g1)':v>55?'var(--a1)':'var(--r1)')+'">'+v+'</span></div>';
        }).join('');
    }

    // ── BLACKROCK ─────────────────────────────────────────
    if (tab === 'BLACKROCK') {
      const bk = ind.blackrock;
      return '<div class="sec">BLACKROCK — RISCO SISTÊMICO · FACTOR ANALYSIS</div>' +
        indGrid([
          {lbl:'RISK SCORE',  val:bk.score.toFixed(1), sub:bk.label, col:bk.color, pct:bk.score},
          {lbl:'β FX',        val:bk.fatores.fx.toFixed(1),   sub:'Exposição cambial', col:'var(--a1)', pct:bk.fatores.fx},
          {lbl:'β RATE',      val:bk.fatores.rate.toFixed(1), sub:'Risco taxa/PBI',    col:'var(--r1)', pct:bk.fatores.rate},
          {lbl:'β TRANS',     val:bk.fatores.trans.toFixed(1),sub:'Risco transferência',col:'var(--c1)',pct:bk.fatores.trans},
        ]) +
        formulaBox('RISK = β_FX + β_RATE + β_ECON + β_TRANS + β_POLIT\nMenor score = menor risco sistêmico') +
        '<div class="sec" style="margin-top:8px">FATORES DE RISCO</div>' +
        Object.entries(bk.fatores).map(([k,v]) => {
          const col = v<10?'var(--g1)':v<20?'var(--a1)':'var(--r1)';
          return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--b0)">' +
            '<span style="width:60px;font-size:8px;font-family:var(--fu);color:var(--t4);text-transform:uppercase">β '+k+'</span>' +
            '<div style="flex:1;height:4px;background:var(--bg0);border-radius:2px">'+
            '<div style="width:'+Math.min(v*2,100)+'%;height:100%;background:'+col+';border-radius:2px"></div></div>' +
            '<span style="width:36px;text-align:right;font-family:var(--fm);font-size:9px;color:'+col+'">'+v+'</span></div>';
        }).join('');
    }

    // ── NASH ──────────────────────────────────────────────
    if (tab === 'NASH') {
      const n = ind.nash;
      return '<div class="sec">NASH — EQUILÍBRIO ESTRATÉGICO · GAME THEORY</div>' +
        indGrid([
          {lbl:'NASH SCORE',   val:n.score.toFixed(1), sub:n.label, col:n.score>75?'var(--g1)':n.score>55?'var(--a1)':'var(--r1)', pct:n.score},
          {lbl:'DOMINÂNCIA',   val:n.dominancia,        sub:'Win+Draw%',       col:'var(--g1)', pct:n.dominancia},
          {lbl:'ESTABILIDADE', val:n.estabilidade,      sub:'1-StdDev/Mean',   col:'var(--c1)', pct:n.estabilidade},
          {lbl:'MIXED STRAT.', val:n.mixed,             sub:'Diversif. posic.', col:'var(--a1)', pct:n.mixed},
        ]) +
        formulaBox('NASH = 0.40×DOMINÂNCIA + 0.35×ESTABILIDADE + 0.25×MIXED\nEquilíbrio: nenhum agente melhora unilateralmente');
    }

    // ── JUNG ──────────────────────────────────────────────
    if (tab === 'JUNG') {
      const j = ind.jung;
      const dims = [
        {a:'E',b:'I',v:j.ei,lA:'Extrovertido\n(Pressing alto)',lB:'Introvertido\n(Bloco baixo)'},
        {a:'S',b:'N',v:j.sn,lA:'Sensação\n(Data-driven)',     lB:'Intuição\n(Visão técnica)'},
        {a:'T',b:'F',v:j.tf,lA:'Thinking\n(Eficiência pura)', lB:'Feeling\n(Estilo / belo)'},
        {a:'J',b:'P',v:j.jp,lA:'Julgamento\n(Estruturado)',   lB:'Percepção\n(Adaptável)'},
      ];
      return '<div class="sec">JUNG — PERFIL PSICOMÉTRICO · ARQUÉTIPO ESPORTIVO</div>' +
        '<div style="display:grid;grid-template-columns:160px 1fr;gap:12px;margin-bottom:10px">' +
          gaugeRing(j.score, 'var(--p1)', j.tipo+'\n'+j.arq) +
          '<div>' +
            '<div class="sec" style="margin-top:0">DIMENSÕES JUNGUIANAS</div>' +
            dims.map(d => {
              const isA = d.v === d.a;
              return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
                '<span style="font-size:11px;font-weight:700;font-family:var(--fu);width:14px;color:'+(isA?'var(--g1)':'var(--t4)')+'">'+d.a+'</span>' +
                '<div style="flex:1;height:6px;background:var(--bg0);border-radius:3px;position:relative">'+
                '<div style="position:absolute;left:'+(isA?'5':'75')+'%;top:50%;transform:translateX(-50%) translateY(-50%);width:10px;height:10px;background:'+(isA?'var(--g1)':'var(--p1)')+';border-radius:50%"></div></div>' +
                '<span style="font-size:11px;font-weight:700;font-family:var(--fu);width:14px;color:'+(!isA?'var(--p1)':'var(--t4)')+'">'+d.b+'</span>' +
                '</div>';
            }).join('') +
          '</div>' +
        '</div>' +
        formulaBox('Tipo: '+j.tipo+' → Arquétipo: '+j.arq+'\nMapeamento via estilo de jogo + consistência + dados');
    }

    // ── FEYNMANN ──────────────────────────────────────────
    if (tab === 'FEYNMANN') {
      const f = ind.feynmann;
      return '<div class="sec">FEYNMANN — EFICIÊNCIA DE SISTEMA · FÍSICA APLICADA</div>' +
        indGrid([
          {lbl:'EFF SCORE',  val:f.score.toFixed(1), sub:f.label, col:f.score>75?'var(--g1)':f.score>55?'var(--a1)':'var(--r1)', pct:f.score},
          {lbl:'OUTPUT',     val:f.output,            sub:'Gols+Ass+VPI contr.', col:'var(--g1)', pct:Math.min(f.output/200*100,100)},
          {lbl:'ENTROPY',    val:f.entropy.toFixed(2),sub:'Desordem tática',     col:f.entropy<0.3?'var(--g1)':'var(--r1)', pct:f.entropy*100},
          {lbl:'PENALTY',    val:f.penalty.toFixed(2),sub:'Fator correção',      col:'var(--c1)', pct:f.penalty*100},
        ]) +
        formulaBox('EFF = Output / Input × EntropyPenalty\nPrinc. Feynman: máx resultado com mín recurso');
    }

    // ── SIT-QUANT ────────────────────────────────────────
    if (tab === 'SIT-QUANT') {
      const q = ind.quant;
      const ratingCol = q.score>=80?'var(--g1)':q.score>=65?'var(--a1)':'var(--r1)';
      return '<div class="sec">SIT-QUANT — MODELO PROPRIETÁRIO CARDINAL PROTOCOL ◆ DIAMOND</div>' +
        '<div style="display:grid;grid-template-columns:220px 1fr;gap:12px;margin-bottom:10px">' +
          gaugeRing(q.score, ratingCol, q.rating+'\n'+q.score.toFixed(1)) +
          '<div>' +
            '<div class="sec" style="margin-top:0">BREAKDOWN DOS 13 INDICADORES</div>' +
            Object.entries(q.breakdown).map(([k, v]) => {
              const pct = Math.min(Math.max(v, 0), 100);
              const col = pct>=80?'var(--g1)':pct>=60?'var(--a1)':'var(--r1)';
              return '<div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid var(--b0)">' +
                '<span style="width:80px;font-size:7.5px;font-family:var(--fu);color:var(--t4);text-transform:uppercase">'+k+'</span>' +
                '<div style="flex:1;height:3px;background:var(--bg0);border-radius:2px">'+
                '<div style="width:'+pct+'%;height:100%;background:'+col+';border-radius:2px"></div></div>' +
                '<span style="width:36px;text-align:right;font-family:var(--fm);font-size:9px;color:'+col+'">'+Math.round(v*10)/10+'</span></div>';
            }).join('') +
          '</div>' +
        '</div>' +
        formulaBox('SIT-QUANT = VPI×0.25 + RSI×0.10 + GRAHAM×0.15\n          + BUFFETT×0.12 + BLACKROCK⁻¹×0.10\n          + NASH×0.10 + FEYNMANN×0.08 + TDM×0.10');
    }

    // ── HP ───────────────────────────────────────────────
    if (tab === 'HP') {
      return '<div class="sec">HP — HISTÓRICO DE PARTIDAS</div>' +
        '<table class="dt"><thead><tr><th>DATA</th><th>ADVERSÁRIO</th><th>PLACAR</th><th>VPI</th><th>RSI PARCIAL</th><th>VAR%</th></tr></thead><tbody>' +
        (t.hp||[]).map((h,i,arr) => {
          const sp = arr.slice(i).map(x=>x.vp).reverse(); sp.push(h.vp);
          const rp = IND.RSI.calc(sp);
          const lp = IND.RSI.label(rp);
          return '<tr><td class="dim">'+h.d+'</td><td>'+h.adv+'</td>'+
            '<td class="a" style="font-weight:700">'+h.pl+'</td>'+
            '<td class="'+(h.vp>=80?'g':h.vp>=65?'a':'r')+'">'+h.vp+'%</td>'+
            '<td style="color:'+lp.col+'">'+rp+'</td>'+
            '<td class="'+(h.var.startsWith('+')?'g':'r')+'">'+h.var+'</td></tr>';
        }).join('')+'</tbody></table>';
    }

    // ── HOLD ─────────────────────────────────────────────
    if (tab === 'HOLD') {
      return '<div class="sec">HOLD — ESTRUTURA SOCIETÁRIA</div>' +
        '<table class="dt"><thead><tr><th>TITULAR</th><th>%</th><th>VALOR</th></tr></thead><tbody>' +
        (t.hold||[]).map(h =>
          '<tr><td>'+h.h+'</td><td class="a">'+h.pct+'</td><td class="g">'+h.v+'</td></tr>'
        ).join('')+'</tbody></table>';
    }

    // ── RIGHTS ───────────────────────────────────────────
    if (tab === 'RIGHTS') {
      return '<div class="sec">RIGHTS — PATROCINADORES & CONTRATOS</div>' +
        '<table class="dt"><thead><tr><th>PARCEIRO</th><th>VALOR</th><th>VIGÊNCIA</th><th>TIPO</th></tr></thead><tbody>' +
        (t.sponsors||[]).map(s =>
          '<tr><td>'+s.s+'</td><td class="g">'+s.v+'</td><td class="dim">'+s.vig+'</td><td class="a">'+s.t+'</td></tr>'
        ).join('')+'</tbody></table>';
    }

    // ── ELENCO ───────────────────────────────────────────
    if (tab === 'ELENCO') {
      return '<div class="sec">ELENCO COMPLETO — DOSSIÊ POR ATLETA</div>' + squadTable(athl, teamKey);
    }

    return '<div class="dim" style="padding:12px;font-size:9px">Tab <span class="a">'+tab+'</span> em desenvolvimento.</div>';
  }

  // ── HELPERS ────────────────────────────────────────────
  function indGrid(items) {
    return '<div class="ind-grid">' + items.map(it =>
      '<div class="ind-card">' +
        '<div class="lbl">'+it.lbl+'</div>' +
        '<div class="val" style="color:'+it.col+'">'+it.val+'</div>' +
        '<div class="sub">'+it.sub+'</div>' +
        '<div class="bar"><div class="bar-fill" style="width:'+Math.min(Math.max(it.pct||0,0),100)+'%;background:'+it.col+'"></div></div>' +
      '</div>'
    ).join('') + '</div>';
  }

  function gaugeRing(val, col, label) {
    const r=54, cx=70, cy=70, circ=2*Math.PI*r;
    const pct = Math.min(Math.max(val,0),100);
    const dash = circ * pct / 100;
    const lines = label.split('\n');
    return '<div class="gauge-wrap">' +
      '<svg width="140" height="140" viewBox="0 0 140 140">' +
        '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--bg2)" stroke-width="8"/>' +
        '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="8"' +
          ' stroke-dasharray="'+dash.toFixed(1)+' '+circ.toFixed(1)+'"' +
          ' stroke-linecap="butt" transform="rotate(-90 '+cx+' '+cy+')" opacity=".85"/>' +
        '<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" fill="'+col+'" font-size="18" font-weight="700" font-family="Rajdhani">'+Math.round(val)+'</text>' +
        '<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" fill="var(--t4)" font-size="7" font-family="Rajdhani">'+lines[0]+'</text>' +
        (lines[1]?'<text x="'+cx+'" y="'+(cy+22)+'" text-anchor="middle" fill="var(--t3)" font-size="8" font-weight="700" font-family="Rajdhani">'+lines[1]+'</text>':'') +
      '</svg>' +
    '</div>';
  }

  function formulaBox(txt) {
    return '<div style="background:var(--bg0);border:1px solid var(--b2);padding:8px 12px;margin:6px 0;border-left:2px solid var(--g3)">' +
      '<div style="font-size:7px;color:var(--t5);font-family:var(--fu);font-weight:700;letter-spacing:1px;margin-bottom:4px">FÓRMULA</div>' +
      '<pre style="font-family:var(--fm);font-size:8.5px;color:var(--g3);white-space:pre-wrap;margin:0">'+txt+'</pre></div>';
  }

  function sparkFull(serie, col) {
    if (!serie.length) return '';
    const w=500, h=60, pad=4;
    const mn=Math.min(...serie), mx=Math.max(...serie);
    const rng = mx-mn || 1;
    const pts = serie.map((v,i) => {
      const x = pad + (i/(serie.length-1||1))*(w-pad*2);
      const y = h - pad - (v-mn)/rng*(h-pad*2);
      return x.toFixed(1)+','+y.toFixed(1);
    }).join(' ');
    return '<svg width="100%" viewBox="0 0 '+w+' '+h+'" style="display:block;margin:4px 0">' +
      '<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.5" opacity=".8"/>' +
      serie.map((v,i) => {
        const x = pad + (i/(serie.length-1||1))*(w-pad*2);
        const y = h - pad - (v-mn)/rng*(h-pad*2);
        return '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="2" fill="'+col+'" opacity=".6"/>'+
          '<text x="'+x.toFixed(1)+'" y="'+(y-6).toFixed(1)+'" fill="var(--t4)" font-size="6" text-anchor="middle" font-family="Rajdhani">'+v.toFixed(1)+'</text>';
      }).join('') +
    '</svg>';
  }

  function squadTable(athl, teamKey) {
    return '<table class="dt"><thead><tr><th>ATLETA</th><th>POS</th><th>VPI</th><th>PBI</th><th>RSI</th><th>GOLS</th><th>ASS</th><th>MIN</th><th>SALÁRIO</th></tr></thead><tbody>' +
      athl.sort((a,b)=>b.vpi-a.vpi).map(a => {
        const vc  = IND.VPI._calcAthlete(a);
        const rsia = IND.RSI.calc([...(a.matches||[]).map(m=>m.v||a.vpi), a.vpi]);
        const url = 'athlete.html?team='+teamKey+'&athlete='+encodeURIComponent(a.n);
        return '<tr>'+
          '<td class="lk" onclick="window.location.href=\''+url+'\'" style="cursor:pointer">'+a.n+'</td>'+
          '<td class="dim">'+a.pos+'</td>'+
          '<td class="'+(vc>=80?'g':vc>=65?'a':'r')+'" style="font-weight:700">'+vc+'%</td>'+
          '<td class="'+(a.pbi<20?'g':a.pbi<30?'a':'r')+'">'+a.pbi+'%</td>'+
          '<td class="dim">'+rsia+'</td>'+
          '<td class="g">'+a.gols+'</td>'+
          '<td class="a">'+a.ass+'</td>'+
          '<td class="dim">'+a.min+'</td>'+
          '<td class="dim">'+a.sal+'</td></tr>';
      }).join('')+'</tbody></table>';
  }

  function kvCard(t) {
    return '<table class="ft">' +
      [['NOME',t.n],['LIGA',t.liga],['FUNDADO',t.founded],['ESTÁDIO',t.stadium],
       ['CAPACIDADE',Number(t.cap||0).toLocaleString()],['TÉCNICO',t.coach],
       ['RECEITA',t.rev],['EBITDA',t.ebitda],['ROE',t.roe]].map(([k,v]) =>
        '<tr><td>'+k+'</td><td>'+v+'</td><td></td></tr>'
      ).join('') + '</table>';
  }

  function statsCard(t) {
    return '<table class="ft">' +
      [['VALOR',t.val],['TDM',t.tdm],['KII',t.kii],
       ['RATING',t.rating+' '+t.score],['VARIAÇÃO',t.chg],
       ['PATROCINADOR',((t.sponsors||[])[0]||{s:'—'}).s],
       ['SÓCIOS',((t.hold||[])[0]||{h:'—'}).h]].map(([k,v]) =>
        '<tr><td>'+k+'</td><td>'+v+'</td><td></td></tr>'
      ).join('') + '</table>';
  }

  function calcOff(t) {
    const athl=t.athletes||[], n=Math.max(athl.length,1);
    const raw=athl.reduce((s,a)=>s+(a.gols*2+a.ass)/Math.max(a.min/90,1),0)/n;
    return Math.min(raw*8,100).toFixed(1);
  }
  function calcDef(t) { return Math.max(100-t.pbi*1.8,0).toFixed(1); }
  function calcDisp(t) {
    const athl=t.athletes||[], n=Math.max(athl.length,1);
    return (athl.reduce((s,a)=>s+Math.min(a.min/3060,1),0)/n*100).toFixed(1);
  }
  function calcImp(t) {
    const hp=t.hp||[];
    const wins=hp.filter(h=>{const[a,b]=h.pl.split('-').map(Number);return a>b;}).length;
    return (hp.length?wins/hp.length*100:60).toFixed(1);
  }
  function calcWinPct(t) {
    const hp=t.hp||[];
    const wins=hp.filter(h=>{const[a,b]=h.pl.split('-').map(Number);return a>b;}).length;
    return hp.length?Math.round(wins/hp.length*100):50;
  }
  function calcTrend(t) {
    const hp=t.hp||[];
    if (hp.length<2) return '→ ESTÁVEL';
    return hp[0].vp>hp[1].vp?'↑ ALTA':hp[0].vp<hp[1].vp?'↓ BAIXA':'→ ESTÁVEL';
  }
}
</script>
