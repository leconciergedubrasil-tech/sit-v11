<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00ff41">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/icon.svg">
<meta charset="UTF-8"><title>SIT · BLACKCARD</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sit-shell.css">
</head>
<body class="sit-layout">
<div id="header"></div>
<div class="sit-body">
  <div class="nav-lateral">
    <div class="nav-section">
      <div class="nav-sec-hd">Funções</div>
      <div class="nav-item" onclick="SIT.go('MON')"><span class="t3">◉</span><span>MONITOR</span></div>
      <div class="nav-item active"><span class="g">■</span><span>BLACKCARD</span></div>
      <div class="nav-item" onclick="SIT.go('COPA')"><span style="font-size:9px">🏆</span><span>COPA 2026</span></div>
      <div class="nav-item" onclick="SIT.go('HELP')"><span class="t3">?</span><span>HELP</span></div>
    </div>
    <div class="nav-section"><div class="nav-sec-hd">Times</div><div id="nav-teams"></div></div>
  </div>
  <div class="sit-content">
    <div style="background:var(--bg0);padding:6px 12px;border-bottom:1px solid var(--b3);display:flex;align-items:center;gap:8px;flex-shrink:0">
      <span style="font-size:18px;font-weight:700;color:var(--a1);font-family:var(--fu)">BLACKCARD</span>
      <button onclick="enviarBlackcardParaVault()" id="btn-bc-vault" style="padding:2px 8px;font-size:7.5px;border:1px solid var(--p2);background:transparent;color:var(--p1);cursor:pointer;font-family:var(--fu);font-weight:700">⬆ VAULT</button>
    <button onclick="exportarPDF()" style="padding:2px 8px;font-size:7.5px;border:1px solid var(--g3);background:transparent;color:var(--g2);cursor:pointer;font-family:var(--fu);font-weight:700">↓ PDF</button>
    <button onclick="window.history.back()" style="margin-left:auto;padding:2px 8px;font-size:7.5px;border:1px solid var(--b2);background:transparent;color:var(--g2);cursor:pointer;font-family:var(--fu)">← BACK</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:12px" id="main-content"></div>
  </div>
</div>
<div id="statusbar"></div>
<script src="sit-db.js"></script>
<script src="sit-indicators.js"></script>
<script src="sit-auth.js"></script>
<script src="sit-core.js"></script>
<script src="sit-news.js"></script>
<script src="sit-vault-bridge.js"></script>
<script src="sit-supabase.js"></script>
<script>
const session = SIT.boot('BLACKCARD');
if (session) {
  AUTH.boot();
  SIT.setBreadcrumb([{label:'MON',href:'MON'},{label:'BLACKCARD'}]);
  const db = SIT_DB.DB;
  document.getElementById('nav-teams').innerHTML = Object.entries(db).map(([k,t]) =>
    '<div class="nav-item" onclick="SIT.go(\''+k+'\')">'+
    '<span class="'+(t.rating==='BUY'?'g':t.rating==='SELL'?'r':'a')+'" style="font-size:7px">●</span>'+
    '<span style="flex:1">'+t.tk+'</span>'+
    '<span class="nav-item-val '+(t.chgN>0?'tup':'tdn')+'">'+t.vpi+'%</span></div>'
  ).join('');
  document.getElementById('main-content').innerHTML = render();
}
function render() {
  const db = SIT_DB.DB;
  const teams = Object.entries(db);
  const params = new URLSearchParams(window.location.search);
  const teamKey = (params.get('team') || 'FLA').toUpperCase();
  const t = db[teamKey];
  if (!t) return '<div class="dim">Time não encontrado.</div>';
  const ind = IND.calcAll(t);
  const athl = (t.athletes||[]).sort((a,b)=>b.vpi-a.vpi);
  
  return '<div style="border:1px solid var(--p1);padding:16px;background:linear-gradient(135deg,var(--bg0),var(--bg1));margin-bottom:12px">'+
    '<div style="font-size:7px;color:var(--p1);font-family:var(--fu);letter-spacing:2px;margin-bottom:8px">◆ CARDINAL BLACK CARD — EXECUTIVE REPORT</div>'+
    '<div style="font-size:22px;font-weight:700;color:var(--t1);font-family:var(--fu)">'+t.n+'</div>'+
    '<div style="font-size:10px;color:var(--t3);margin-top:2px">'+t.liga+' · '+t.stadium+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px">'+
    [
      {l:'SIT-QUANT',v:ind.quant.score.toFixed(1),s:ind.quant.rating,c:'var(--p1)'},
      {l:'MOAT (BUFFETT)',v:ind.buffett.score.toFixed(1),s:ind.buffett.label,c:'var(--g1)'},
      {l:'RISCO (BLACKROCK)',v:ind.blackrock.label,s:ind.blackrock.score.toFixed(1),c:ind.blackrock.color},
      {l:'GRAHAM VI',v:ind.graham.vi.toFixed(1),s:ind.graham.margin.toFixed(1)+'% margem',c:ind.graham.margin>30?'var(--g1)':'var(--a1)'},
    ].map(it=>'<div style="border:1px solid var(--b2);padding:8px;background:var(--bg0)">'+
      '<div style="font-size:6.5px;color:var(--t4);font-family:var(--fu);letter-spacing:.8px">'+it.l+'</div>'+
      '<div style="font-size:20px;font-weight:700;font-family:var(--fu);color:'+it.c+'">'+it.v+'</div>'+
      '<div style="font-size:7.5px;color:var(--t3)">'+it.s+'</div></div>'
    ).join('')+'</div></div>'+
    '<div class="sec">TOP ATLETAS — BLACKCARD RANKING</div>'+
    '<table class="dt"><thead><tr><th>#</th><th>ATLETA</th><th>POS</th><th>VPI</th><th>PBI</th><th>SALÁRIO</th><th>CLÁUSULA</th></tr></thead><tbody>'+
    athl.slice(0,8).map((a,i)=>{
      const url='athlete.html?team='+teamKey+'&athlete='+encodeURIComponent(a.n);
      return '<tr><td class="dim">'+(i+1)+'</td>'+
        '<td class="lk" onclick="window.location.href=\''+url+'\'" style="cursor:pointer">'+a.n+'</td>'+
        '<td class="dim">'+a.pos+'</td>'+
        '<td class="'+(a.vpi>=80?'g':a.vpi>=65?'a':'r')+'" style="font-weight:700">'+a.vpi+'%</td>'+
        '<td class="'+(a.pbi<20?'g':a.pbi<30?'a':'r')+'">'+a.pbi+'%</td>'+
        '<td class="dim">'+a.sal+'</td>'+
        '<td class="r">'+a.clause+'</td></tr>';
    }).join('')+'</tbody></table>';
}
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").then(()=>console.log("[PWA] SW registrado")).catch(e=>console.warn("[PWA]",e));}
window.exportarPDF = function() {
  const el = document.getElementById('main-content');
  if (!el) return;
  const original = document.title;
  document.title = 'SIT-BlackCard-' + new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');
  // Estilo para impressão
  const style = document.createElement('style');
  style.id = 'print-style';
  style.textContent = '@media print { body { background:#000!important; color:#d0ffd8!important; } .nav-lateral,.menubar,.topbar,.ticker-wrap,.breadcrumb,.status-bar { display:none!important; } .sit-content { overflow:visible!important; } }';
  document.head.appendChild(style);
  window.print();
  setTimeout(() => { document.getElementById('print-style')?.remove(); document.title = original; }, 1000);
};
</script>
</body>
</html>
