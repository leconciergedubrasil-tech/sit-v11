<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00ff41">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/icon.svg">
<meta charset="UTF-8"><title>SIT · FX PANEL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sit-shell.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg0);color:var(--t1);font-family:var(--fm);overflow:hidden;height:100vh;display:flex;flex-direction:column}
.panel-header{height:26px;background:#000;border-bottom:1px solid var(--b3);display:flex;align-items:center;gap:6px;padding:0 8px;flex-shrink:0;cursor:move}
.ph-title{font-size:8px;font-weight:700;color:var(--t4);font-family:var(--fu);letter-spacing:1px;flex:1}
.ph-close{background:transparent;border:none;color:var(--t4);cursor:pointer;font-size:10px}
.ph-close:hover{color:var(--r1)}
.panel-body{flex:1;overflow-y:auto;padding:6px 8px}
.fx-row{display:flex;align-items:center;gap:0;padding:5px 0;border-bottom:1px solid var(--b0)}
.fx-flag{font-size:16px;width:28px;flex-shrink:0}
.fx-pair{font-family:var(--fu);font-weight:700;font-size:9px;color:var(--t3);width:66px;letter-spacing:.3px;flex-shrink:0}
.fx-rate{font-family:var(--fm);font-size:16px;font-weight:700;flex:1;text-align:right}
.fx-col{width:48px;text-align:right;font-family:var(--fm);font-size:9px;flex-shrink:0}
.status-bar{height:18px;background:#000;border-top:1px solid var(--b1);display:flex;align-items:center;padding:0 8px;flex-shrink:0;gap:8px}
.sb-txt{font-size:7px;color:var(--t5);font-family:var(--fu)}
</style>
</head>
<body>
<div class="panel-header">
  <div class="pulse-dot"></div>
  <span class="ph-title">FX — CÂMBIO AO VIVO</span>
  <span id="ph-src" style="font-size:7px;color:var(--t5);font-family:var(--fu)">mock</span>
  <button class="ph-close" onclick="window.close()">✕</button>
</div>
<div class="panel-body" id="fx-list"></div>
<div class="status-bar">
  <span class="sb-txt">SPOT RATE</span>
  <span class="sb-txt" id="sb-time"></span>
  <span class="sb-txt" style="margin-left:auto">FX · PAINEL DESTACADO</span>
</div>
<script src="sit-db.js"></script>
<script>
function render(rates){
  const base=SIT_DB.FX_BASE;
  document.getElementById('fx-list').innerHTML=Object.entries(base).map(([pair,d])=>{
    const rate=rates?.[pair.replace('/','')]||d.rate;
    const up=rate>=d.prev;
    const col=up?'var(--g1)':'var(--r1)';
    const chg=((rate-d.prev)/d.prev*100).toFixed(2);
    return `<div class="fx-row">
      <span class="fx-flag">${d.flag}</span>
      <span class="fx-pair">${pair}</span>
      <span class="fx-rate" style="color:${col}">${rate}</span>
      <span class="fx-col" style="color:${col}">${up?'+':''}${chg}%</span>
    </div>`;
  }).join('');
}

// Tentar buscar FX real
async function loadReal(){
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/USD',{signal:AbortSignal.timeout(4000)});
    const d=await r.json();
    const brl=d.rates.BRL;
    document.getElementById('ph-src').textContent='● REAL';
    document.getElementById('ph-src').style.color='var(--g3)';
    render({'USDBRL':brl,'EURBRL':+(brl/d.rates.EUR).toFixed(4),
            'GBPBRL':+(brl/d.rates.GBP).toFixed(4),'EURUSD':+(1/d.rates.EUR).toFixed(4)});
  }catch(e){ render(null); }
}
setInterval(()=>{document.getElementById('sb-time').textContent=new Date().toLocaleTimeString('pt-BR');},1000);
setInterval(loadReal, 60000); // atualiza a cada 1 min
loadReal();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").then(()=>console.log("[PWA] SW registrado")).catch(e=>console.warn("[PWA]",e));}</script>
</body>
</html>
